notes: |
  **Completed (verified).** Six MCP tools shipped in **territory-ia** v0.5.0: **(1) `backlog_search`** — keyword search across backlog issues. **(2) `invariant_preflight`** — composite context bundle (invariants + router + spec sections) for an issue. **(3) `findobjectoftype_scan`** — static C# scan for per-frame `FindObjectOfType` violations. **(4) `economy_balance_snapshot`** — bridge: economy/happiness/demand from Play Mode. **(5) `prefab_manifest`** — bridge: scene MonoBehaviours + missing scripts. **(6) `sorting_order_debug`** — bridge: renderers + sorting order at a cell. 115 tests pass; `npm run verify` green. Also added `parseAllBacklogIssues` to `backlog-parser.ts`, exported `parseInvariantsBody` and `collectRouterData` for internal reuse, C# `AgentBridgeResponseFileDto.CreateOk` factory method. **Migrated content:** [`docs/mcp-ia-server.md`](docs/mcp-ia-server.md), [`tools/mcp-ia-server/README.md`](tools/mcp-ia-server/README.md).
