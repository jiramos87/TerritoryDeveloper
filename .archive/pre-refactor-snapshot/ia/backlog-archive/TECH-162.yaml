notes: |
  Stage 2.1 Phase 2 closer. Ctor extended to `BlipBaker(int sampleRate = 0, long budgetBytes = 4L * 1024 * 1024)` — 4 MB default per orchestrator Stage 2.1 Exit; throws `ArgumentOutOfRangeException` on `budgetBytes <= 0`. Folded `_totalBytes` accounting into `TryEvictHead` (single mutation site). Miss-insert loop: `while (_totalBytes + newByteCount > _budgetBytes && TryEvictHead()) { }` then `AddAtTail` + `_totalBytes += newByteCount`. Oversize single entry (`newByteCount > _budgetBytes`) → drains cache + post-loop `Debug.LogWarning` + inserts anyway so `BakeOrGet` never returns null. New `internal long DebugTotalBytes` test hook. Decision Log — fold accounting into `TryEvictHead` (not sibling wrapper) keeps invariant local, TECH-161 tests assert structural pop + `Destroy` only so stay green; ctor param order `(sampleRate, budgetBytes)` preserves TECH-161 default-arg call sites; oversize warn+insert beats throw/drop/null (never silently drops play requests). Tests — `BlipBakerBudgetTests.cs` EditMode coverage (budget ceiling, normal insert, oversize warning+non-null, evicted clip destroyed, invalid ctor throws).
acceptance: |
  `_totalBytes ≤ _budgetBytes` after every normal insert; oversize case warns + still returns clip; evicted `AudioClip` instances destroyed; Stage 2.1 Exit bullets 3 + 4 satisfied; `unity:compile-check` + `validate:all` green.
