title: BlipBaker core + render path (Stage 2.1 Phase 1) (2026-04-15)
priority: medium
status: closed
section: ""
spec: (removed at closeout — journal persist skipped, db_unconfigured)
files: 
  - Assets/Scripts/Audio/Blip/BlipBaker.cs
notes: |
  Stage 2.1 Phase 1 opener. Plain class (not MonoBehaviour) at `Assets/Scripts/Audio/Blip/BlipBaker.cs`. `BakeOrGet(in BlipPatchFlat patch, int patchHash, int variantIndex) → AudioClip`. `sampleRate` is baker ctor param (default `AudioSettings.outputSampleRate`) — not a flat field. `patchHash` passed per-call (flat struct defers hash per Stage 1.2). Main-thread assert at entry via `BlipBootstrap.MainThreadId`; this task also lands the minimal static prop + `Awake` capture for Stage 2.3 T2.3.1 to reuse. Render path: `lengthSamples = (int)(patch.durationSeconds * _sampleRate)`, `float[]` alloc, default `BlipVoiceState`, `BlipVoice.Render(...)`, wrap via `AudioClip.Create(name, lengthSamples, 1, _sampleRate, stream: false)` + `clip.SetData(buffer, 0)`. Cache hit/miss dispatch deferred to follow-up (bake-key + LRU). Invariants #3 + #4 — no `FindObjectOfType`, no singleton; instance owned by `BlipCatalog` (Stage 2.2). Decision Log — plain class over MonoBehaviour (no scene state); non-streaming clip (<1 s buffer in memory); `sampleRate` ctor param over flat field (Stage 1.2 already archived) + over per-call param (keeps cache key `(patchHash, variantIndex)` only); `patchHash` explicit arg over flat-field read (flat defers hash; SO holds `.PatchHash`); `BlipBootstrap.MainThreadId` landed here vs Stage 2.3 T2.3.1 (baker needs the accessor first).
acceptance: |
  `BlipBaker.BakeOrGet` returns non-null `AudioClip` w/ `.samples == lengthSamples`, `.channels == 1`, `.frequency == sampleRate`; clip name matches `Blip_{patchHash:X8}_v{variantIndex}`; main-thread assert throws `InvalidOperationException` on background-thread invocation; `unity:compile-check` + `validate:all` green.
depends_on: []
depends_on_raw: Step 1 Stage 1.2 + 1.3 (archived — `BlipPatchFlat`, `BlipVoice.Render`, `BlipVoiceState`)
