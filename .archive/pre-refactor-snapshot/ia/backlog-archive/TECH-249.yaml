notes: |
  Rewired `web/app/dashboard/page.tsx` to consume `parseFilterValues` + `toggleFilterParam` from `@/lib/dashboard/filter-params` (TECH-248). Replaced `firstParam` single-value coercion + local `buildHref` w/ `MultiParams = { plan: string[]; status: string[]; phase: string[] }` shape. `filterPlans` now uses `.includes` predicate w/ empty-array = no-filter semantics — OR within dimension (status=Draft,In+Progress matches either) + AND across dimensions (status AND phase must hold). Hierarchical prune on tasks → stages → steps → plans preserved. Per-chip `href` via local `chipHref(key, value)` — single `toggleFilterParam(currentSearch, key, value)` call per chip, prefixed `/dashboard?${qs}` or bare `/dashboard` when empty. `currentSearch` built from `rawParams` preserving sibling dimensions. Chip `active = multi[key].includes(chipValue)` (dropped single-value equality). `anyFilter = multi.plan.length + multi.status.length + multi.phase.length > 0`. Deleted unused `firstParam` + local `buildHref` helpers. Satisfies Stage 4.4 Exit bullet 3.
acceptance: |
  page imports both helpers; filter logic OR-within / AND-across; chip hrefs via toggle helper; multi-select smoke `?status=Draft,In+Progress` narrows rows; `npm run validate:all` exit 0.
depends_on: 
  - TECH-247
  - TECH-248
