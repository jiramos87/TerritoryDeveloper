notes: |
  Locked **roll-own JWT + sessions** (Q11 confirmed) — row appended to orchestrator `§Orchestrator Decision Log` (2026-04-16). Stack: `jose` (`SignJWT` / `jwtVerify`, Edge-safe Web Crypto) for token sign/verify; `@node-rs/argon2` (argon2id) password hash confined to Node-runtime route handlers — never Edge middleware; stateful `session` row (`id UUID PK, user_id UUID FK, expires_at TIMESTAMPTZ, token TEXT`) enables revocation per Q11 "no third-party auth provider". Three locked downstream constants: `SESSION_COOKIE_NAME=portal_session` (consumed TECH-5.3.1 middleware), `SESSION_LIFETIME_DAYS=30` (consumed TECH-5.2.1 schema), password hash lib `@node-rs/argon2` (consumed TECH-5.2.3 stub `/api/auth/register`). Lucia Auth v3 rejected — officially sunsetted/archived by author (pilcrow) late 2025; maintenance risk unacceptable for a session-first library owning cookie + session lifecycle. Auth.js v5 (NextAuth) rejected — full OAuth/PKCE/CSRF machinery ships even with Credentials-only config (~50 kB server bundle overhead); Credentials provider + DB session requires Node runtime split anyway (same as roll-own); overkill for email+password MVP with no social login planned. Durable rationale + constants migrated to `docs/web-platform-exploration.md §Phase W7` so TECH-254 / TECH-5.2.x / TECH-5.3.x readers find them without re-reading deleted spec. No code — Decision Log authoring only.
acceptance: |
  Decision Log row appended w/ locked library + API surface note + rationale; Q11 confirm/update entry visible in orchestrator header; `npm run validate:all` exit 0.
