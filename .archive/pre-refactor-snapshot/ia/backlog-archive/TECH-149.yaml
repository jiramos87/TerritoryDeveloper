notes: |
  Stage 1.2 Phase 2 opener. `python -m sprite_gen render {archetype}` — resolves `specs/{archetype}.yaml` cwd-independent via `Path(__file__).resolve().parent.parent / "specs"`, loads + validates via `load_spec` (**TECH-148** archived), iterates `range(spec['output'].get('variants', 1))`, applies `apply_variant(spec, idx)` deepcopy + seeded `random.Random(spec.get('seed', 0) + idx)` permutation (material swap within inline family map, prism pitch × `rng.uniform(0.8, 1.2)` clamped `[0, 1]`), calls `compose_sprite` (**TECH-147** archived), writes `out/{spec['output']['name']}_v{idx+1:02d}.png`. `main(argv=None) → int` returns exit code; `__main__.py` two-liner wraps `SystemExit(main())` for fast pytest without subprocess. Decision Log — argparse over click (stdlib, no new dep); variant count reads `spec['output']['variants']` (not top-level) matching TECH-148 schema; output name from `spec['output']['name']` (not `id`, which carries `_v1` suffix); inline material-family swap map temporary until Stage 1.3 palette class metadata lands (**TECH-153**); `main()` returns int over `sys.exit` inside — enables direct-call pytest.
acceptance: |
  `python -m sprite_gen render building_residential_small` writes N PNGs to `out/`; exit 0 success, 1 on missing archetype / `yaml.YAMLError` / `SpecValidationError`; deterministic bytes across same-seed runs; `npm run validate:all` green.
