notes: |
  Stage 2.2 Phase 2 closer. Client component `web/components/WikiSearch.tsx` (`'use client'`) fetches `/search-index.json` on mount (unmount-guarded `useEffect`), builds `Fuse` instance in `useMemo` w/ `keys: ['title','body','category']`, `threshold: 0.35`, `includeScore: false`. Controlled input; top 10 results link `/wiki/{slug}` via `next/link` w/ category badge. Imports `SearchRecord` from `@/lib/search/types` (no local redefinition). Token-driven styling via `@/lib/tokens`. Embedded in `web/app/wiki/page.tsx` header below description. `fuse.js` pinned exact version. Decision Log — static JSON + client Fuse (no server infra, 156 records trivially fits memory; alternatives: Route Handler streaming, Algolia — overkill); reuse `SearchRecord` (shape owned by TECH-186 emitter, duplication would drift); threshold `0.35` initial (balance typo tolerance + noise on small record set; `0.3` stricter / `0.4` looser revisit on feedback).
acceptance: |
  `/wiki` header shows search input; fuzzy matches span glossary + wiki records linking `/wiki/{slug}`; `fuse.js` pinned exact in `web/package.json`; `web/package-lock.json` updated; `cd web && npm run lint && npm run typecheck && npm run build` green; `npm run validate:web` + `npm run validate:all` green.
