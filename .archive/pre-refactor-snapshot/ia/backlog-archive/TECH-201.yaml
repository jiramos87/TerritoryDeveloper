notes: |
  `loadAllPlans(): Promise<PlanData[]>` — globs `ia/projects/*-master-plan.md` from repo root via `fs.promises` (cwd-aware: repo root vs `web/`, mirror Stage 2.1/2.3 loader `resolveContentPath` idiom); reads files; dynamic `import('../../tools/progress-tracker/parse.mjs')` → `parseMasterPlan(content, filename)` passes basename (matches CLI `index.mjs` line 53); returns sorted `PlanData[]`. `parse.mjs` byte-identical — wrapper-only invariant. Decision Log — filter idiom `includes('master-plan') && endsWith('.md')` mirrors `index.mjs` lines 39–42 verbatim to stay drift-free w/ CLI; filename arg = basename (`PlanData` consumers key off basename for sibling-warning match); empty-dir returns `[]` (diverges from CLI exit-1 — RSC prefers graceful empty render, documented divergence); no caching in v1 (Node ESM module cache dedupes `parse.mjs`; file-content memo deferred until profiling justifies).
acceptance: |
  `loadAllPlans()` exported + typed; `git diff tools/progress-tracker/parse.mjs` empty; `npm run validate:web` + `npm run validate:all` green.
