notes: |
  **Problem:** `BACKLOG.md` + `BACKLOG-ARCHIVE.md` = single shared mutable files. Every mutator skill (**`project-new`**, **`stage-file`**, **`project-spec-close`**, **`project-stage-close`**, **`release-rollout-enumerate`**, **`release-rollout-track`**) scans both for max id then row-inserts / row-removes. Parallel agents → duplicate ids, insert-conflict, validator FS races, orphan **project spec** ↔ row pairs. Closeout purge pass (ripgrep + edit across `ia/specs/**`, `docs/**`, `ia/rules/**`, code comments) = worst blast radius. **Approach:** per-issue yaml under `ia/backlog/{id}.yaml` + `ia/backlog-archive/{id}.yaml`; monotonic id counter `ia/state/id-counter.json` under `flock`; `materialize-backlog.sh` regens `BACKLOG.md` + `BACKLOG-ARCHIVE.md` as artifact (round-trip-gated). **Safety rails:** **rollout lifecycle** (tracker link resolution + enumerate + track signal); MCP reader back-compat (`backlog_issue`, `backlog_search` response shapes preserved); dashboard `/dashboard` still renders master plans. **Migration:** one-shot `migrate-backlog-to-yaml.mjs` + round-trip diff gate (whitespace-only). **Concurrency model:** parallel **`project-new`** safe via flock; parallel closeout safe if purge-sets disjoint (orchestrator gate). **Glossary:** add **backlog record** + **backlog view** rows. **Out of scope:** distributed / cross-repo lock; deleting generated md from git (recommendation = keep for GitHub + dashboard back-compat). Full context + phased plan in `ia/projects/TECH-289.md`.
acceptance: |
  all writer skills + MCP readers migrated; `npm run validate:all` green; round-trip `migrate → materialize → diff` = empty; parallel soak (3 **`project-new`** worktrees + 2 closeouts disjoint purge) zero dup ids / zero orphans / zero git conflicts; **rollout tracker** end-to-end smoke advances 1 row through (f) ≥1-task-filed; dashboard renders; glossary rows + indexes regen; `npm run validate:backlog-yaml` exists + green; public MCP tool response shapes unchanged
