title: YAML spec loader + validator (Stage 1.2 Phase 1) (2026-04-14)
priority: closed
status: closed
section: Completed (moved from BACKLOG.md, 2026-04-14)
spec: (removed at closeout — journal persist skipped, db_unconfigured)
files: 
  - tools/sprite-gen/src/spec.py
  - tools/sprite-gen/tests/test_spec.py
  - tools/sprite-gen/tests/fixtures/spec_valid.yaml
  - tools/sprite-gen/tests/fixtures/spec_malformed.yaml
notes: |
  Stage 1.2 Phase 1 second task. `load_spec(path) → dict` — loads YAML via `yaml.safe_load`, validates required keys (`id`, `class`, `footprint`, `terrain`, `composition`, `palette`, `output`) via flat `REQUIRED_KEYS` table; `SpecValidationError(field=...)` raised on missing / wrong-typed key; `footprint` 2-int shape check; `composition` non-empty list-of-dicts-with-`type` check; optional fields (`levels`, `seed`, `variants`, `diffusion`) round-trip un-validated; `yaml.YAMLError` bubbles for parse failures (CLI maps both to exit 1). Decision Log — flat required-key table over Pydantic (minimal deps, small schema); pass-through optional fields (keeps loader stable while Stages 1.3 / 1.4 add palette/slope/diffusion semantics); distinct `SpecValidationError` vs `yaml.YAMLError` (preserves parse-line info). 22 pytest cases green.
acceptance: |
  `load_spec(valid)` → dict; missing key → `SpecValidationError` w/ `field`; malformed YAML → `yaml.YAMLError`; `npm run validate:all` green.
