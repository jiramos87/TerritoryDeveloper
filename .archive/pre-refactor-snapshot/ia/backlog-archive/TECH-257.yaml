notes: |
  `BlipPatch` gained `[SerializeField] private BlipFxSlot[] fxChain = new BlipFxSlot[0]` + `BlipFxSlot[] FxChain => fxChain` getter mirroring oscillator public surface. `OnValidate` truncates `fxChain` to max 4 entries via `Array.Resize(ref fxChain, 4)` after existing oscillator cap-at-3 resize (silent truncate precedent). `BlipPatchFlat` gained 4 inline `readonly BlipFxSlotFlat fx0, fx1, fx2, fx3` + `readonly int fxSlotCount` between oscillator triplet and envelope — blittable discipline preserved (no array allocations). Ctor extended after oscillator flatten: `fxSlotCount = fx != null ? Mathf.Min(fx.Length, 4) : 0`; unused slots default. `BlipPatchHash.Compute` append-only section 9 — feeds `fxSlotCount` + per-active-slot `kind`/`param0`/`param1`/`param2`; sections 1–8 unchanged. Decision Log: FX cap=4 vs oscillator cap=3 (composition depth); silent truncate (author ergonomics precedent); `patchHash` feeds FX unconditionally (one-time shift at land — fixtures gate on PCM tolerance per `ia/specs/audio-blip.md §7.2`, not hash equality; LRU re-bakes on miss); append-only section order frozen (FX delay state + LFO state append as sections 10+ in Stage 5.2/5.3). MVP golden fixtures stayed bit-exact (empty-chain passthrough). Closes Stage 5.1 Phase 1 Exit bullets on `BlipPatch` + `BlipPatchFlat` extension. Feeds **TECH-258** (`BlipVoiceState` FX state), **TECH-259** (`BlipFxChain.ProcessFx` kernel), **TECH-260** (`BlipVoice.Render` FX dispatch).
acceptance: |
  `BlipPatch.fxChain` + `OnValidate` truncation present; `BlipPatchFlat` has 4 inline fx slots + `fxSlotCount`; existing MVP golden fixtures pass (empty chain = passthrough); `npm run unity:compile-check` green; `npm run validate:all` exit 0.
depends_on: 
  - TECH-256
depends_on_raw: "**TECH-256** (archived — `BlipFxKind` / `BlipFxSlot` / `BlipFxSlotFlat` types)."
