  Blip master-plan Stage 1.2 Phase 1 opener. `BlipPatch : ScriptableObject` landed w/ 15 MVP scalar fields (`oscillators[0..3]`, `envelope`, `filter`, `variantCount`, jitter triplet, `voiceLimit`, `priority`, `cooldownMs`, `deterministic`, `mixerGroup` authoring-only ref, `durationSeconds`, `useLutOscillators` reserved, `patchHash` `[SerializeField] private int`). `CreateAssetMenu("Territory/Audio/Blip Patch")` attribute wired. No `AnimationCurve` fields. No `mode` field / `BlipMode` enum (deferred post-MVP per `docs/blip-post-mvp-extensions.md` §1). Decisions: `mixerGroup` stays on SO (authoring-only) — NOT flattened into `BlipPatchFlat` to keep struct blittable; `BlipMixerRouter` parallel to catalog holds `BlipId → AudioMixerGroup` map (Step 2). `patchHash` serialized on SO (persist across Editor reload; computed TECH-115). Feeds flatten (TECH-114) + hash persist (TECH-115) + DSP kernel (Stage 1.3). Orchestrator: [`projects/blip-master-plan.md`](../ia/projects/blip-master-plan.md) Stage 1.2.
