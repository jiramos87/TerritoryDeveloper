  **Completed (verified ŌĆö `/project-spec-close`).** `web/drizzle.config.ts` (new) exports `defineConfig({ schema: './lib/db/schema.ts', out: './drizzle', dialect: 'postgresql', dbCredentials: { url: process.env.DATABASE_URL ?? 'postgresql://placeholder' } })` ŌĆö drizzle-kit v0.20+ `dialect` key; placeholder fallback prevents `db:generate` crash offline (generate is schema-only, no DB hit). `web/package.json` `scripts.db:generate` = `"drizzle-kit generate"` (no `--config` flag ŌĆö drizzle-kit picks `drizzle.config.ts` at `cwd`). `cd web && npm run db:generate` offline produces `web/drizzle/0000_*.sql` + `web/drizzle/meta/{_journal,0000_snapshot}.json` (CREATE TABLE statements for user/session/save/entitlement w/ FK cascade). `web/README.md ┬¦Portal` extended w/ "Migration tooling" subsection ŌĆö documents `db:generate` purpose + output dir + commit stance + "Step 5 architecture-only ŌĆö no `db:migrate` script" boundary. Decision Log ŌĆö commit `web/drizzle/` (not gitignore) per drizzle convention + PR-reviewable schema diffs; `dialect: 'postgresql'` + `DATABASE_URL` placeholder fallback (contributor first-run DX); NO `db:migrate` script in Stage 5.2 (Step 5 architecture-only; migrations in post-Step-5 portal-launch plan). Validate: `npm run validate:all` exit 0. Stage 5.2 Phase 1 second Exit bullet satisfied.
