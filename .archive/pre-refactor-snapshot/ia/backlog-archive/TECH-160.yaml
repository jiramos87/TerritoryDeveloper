id: TECH-160
type: infrastructure / cache
title: Bake key + cache hit dispatch (Stage 2.1 Phase 1) (2026-04-15)
priority: medium
status: closed
section: ""
spec: (removed at closeout ŌĆö journal persist failed, Decision Log captured in Notes)
files: 
  - Assets/Scripts/Audio/Blip/BlipBakeKey.cs
  - Assets/Scripts/Audio/Blip/BlipBaker.cs
notes: |
  Stage 2.1 Phase 1 closer. New file `BlipBakeKey.cs` ŌĆö `public readonly struct BlipBakeKey(int patchHash, int variantIndex)` w/ `IEquatable<BlipBakeKey>` + deterministic hash combine (`patchHash * 397 ^ variantIndex`). In `BlipBaker`: `Dictionary<BlipBakeKey, LinkedListNode<BlipBakeEntry>> _index` + `LinkedList<BlipBakeEntry> _lru`. `BakeOrGet` probes `_index` first; hit ŌåÆ `_lru.Remove(node); _lru.AddLast(node)` (LRU tail promote) + return cached clip; miss ŌåÆ invokes Stage 2.1 Phase 1 opener render path, then hands to Phase 2 insertion + eviction. Reuses `patch.patchHash` from Stage 1.2. Decision Log ŌĆö `LinkedList<LinkedListNode<Entry>>` indirection (O(1) access-order reorder + O(1) head pop) over `List<T>` (O(n) removal) / `OrderedDictionary` (boxes values); `patchHash * 397 ^ variantIndex` hash combine over `HashCode.Combine` (avoids per-call alloc on some runtimes); keep 3-arg `BakeOrGet(in patch, int patchHash, int variantIndex)` (`BlipPatchFlat` defers `patchHash` per Stage 1.2 ŌĆö caller reads `BlipPatch.PatchHash`) over adding hash to flat struct (scope creep + breaks blittable-frozen-field contract); `BlipBakeEntry` ref class with `key` + `clip` only (additive byteCount lands next task) over mutable struct entry (`node.Value` copy traps) / full shape in one task (splits Phase 1 / 2 ownership).
acceptance: |
  cache hit returns same `AudioClip` ref as prior bake (ref-equality); miss path produces fresh clip + inserts at LRU tail; node reordering on hit keeps newest at tail; `unity:compile-check` + `validate:all` green.
