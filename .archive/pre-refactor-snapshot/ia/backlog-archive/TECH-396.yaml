id: TECH-396
type: tech (audio infra / dev workflow)
title: Universal BlipBootstrap self-instantiation via RuntimeInitializeOnLoadMethod + Resources/ prefab
priority: medium
status: closed
section: Blip audio program
spec: (removed after closure)
closed: 2026-04-18
files:
  - Assets/Scripts/Audio/Blip/BlipBootstrap.cs
  - Assets/Resources/BlipBootstrap.prefab
  - Assets/Scripts/Audio/Blip/PlayModeTests
notes: |
  Direct-loading `MainScene.unity` (or any non-boot scene) in Editor = zero audio. **BlipBootstrap** + **BlipCatalog** + **BlipPlayer** live only in `MainMenu.unity`, so `BlipEngine.ResolveCatalog` / `ResolvePlayer` return null + `Play` silent. Blocks direct-scene testing for humans + agents (2-click MainMenu → New Game path per audio check). Fix: move prefab to `Assets/Resources/BlipBootstrap.prefab` + add `[RuntimeInitializeOnLoadMethod(BeforeSceneLoad)]` static method on **BlipBootstrap** that loads prefab + instantiates if `Instance == null`. Existing `Instance` guard + `DontDestroyOnLoad` handle dedup w/ legacy MainMenu scene instance. Complements prior branch fix (`AssertMainThread` short-circuit when `MainThreadId == 0`) — that made direct-scene safe, this makes it audible. Standalone infra fix, NOT Step 5 / Step 6 child (no new `BlipId`, no FX / LFO surface touched).
acceptance: |
  Direct-load `MainScene.unity` in Editor → `BlipEngine.Play(BlipId.UiButtonClick)` emits audio (pool `AudioSource.isPlaying == true` or voice audible). `MainMenu.unity` → New Game flow no regression (Instance-guard dedup verified). PlayMode smoke direct-loads non-boot scene + asserts `Play` emits voice — green in `unity:testmode-batch`. `npm run unity:compile-check` + `npm run validate:all` exit 0. Invariant #3 + #4 respected (load-time one-shot, not per-frame; no new singleton type — reuses existing `BlipBootstrap.Instance`).
