notes: |
  Five stages shipped by fresh agents against a stage/phase execution model. Stage 1 â€” bootstrap Claude Code layer (`.claude/settings.json` with `acceptEdits` + `mcp__territory-ia__*` wildcard, 4 hooks, 5 slash command stubs, `MEMORY.md` seed, `project-stage-close` skill). Stage 2 â€” structural move `.cursor/{specs,rules,skills,projects,templates}` â†’ `ia/...`, cross-extension `.md â†’ .md` symlinks for back-compat, MCP server path constants, validator symlink-awareness. Stage 3 â€” four-field IA frontmatter on 74 files, `validate:frontmatter` validator, verification policy consolidated to `docs/agent-led-verification-policy.md` (single canonical source), `AGENTS.md` / `BACKLOG.md` / `CLAUDE.md` / `docs/information-architecture-overview.md` densified. Stage 4 â€” 5 native subagents (`spec-kickoff`, `spec-implementer`, `verifier`, `test-mode-loop`, `closeout`; Opus orchestrators + Sonnet executors), 5 real slash commands, 2 output styles (`verification-report`, `closeout-digest` â€” JSON header + caveman summary), caveman directive enforced at 4 layers (16 path grep gate). Stage 5 â€” 3 new code-intelligence MCP tools (`unity_callers_of`, `unity_subscribers_of`, `csharp_class_summary`) + `glossary_lookup` extended to graph shape (`related`, `cited_in`, `appears_in_code`), precomputed `glossary-graph-index.json` (I3 companion to I1 / I2). Cursor remains a first-class consumer throughout via back-compat symlinks. Canonical stances locked: `permissions.defaultMode: "acceptEdits"` (discovered after in-vivo chicken-and-egg friction with default mode), `mcp__territory-ia__*` wildcard (vs per-tool list), 4-layer caveman directive (subagent body + skill preamble + slash command body + stage-close handoff template), subagent `tools` field as explicit per-subagent allow-list (not wildcard).
