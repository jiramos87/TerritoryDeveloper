id: TECH-195
type: infrastructure / web workspace
title: Extend sitemap w/ devlog slugs + footer nav links (Stage 2.3 Phase 2) (2026-04-15)
priority: medium
status: closed
section: ""
spec: (removed at closeout — journal persist `ok`, both sections empty)
files: 
  - web/app/sitemap.ts
  - web/app/layout.tsx
notes: |
  Extend `sitemap.ts` — `resolveDevlogDir()` helper mirrors `resolvePagesDir` (cwd = repo root or `web/`); scans `web/content/devlog/*.mdx`, parses `gray-matter` for frontmatter `date`, emits entries `${base}/devlog/${stem}` w/ `lastModified=new Date(date)`, `changeFrequency: 'weekly'`, `priority: 0.6`; `/devlog` index entry `priority: 0.7`, `lastModified=max(date)` across posts (fallback `new Date()`). Pages-section ordering untouched. `web/app/layout.tsx` — new `<footer>` sibling after `{children}` inside `<body>` (root layout `flex flex-col`); two `next/link` anchors `/devlog` ("Devlog") + `/feed.xml` ("RSS"), inline `@/lib/tokens` muted-text + top-border styling, no new component file. Decision Log — RSS autodiscovery `<link rel="alternate">` deferred (explicit Non-Goal per Stage 2.3 scoping); footer inlined in root layout vs separate `Footer.tsx` component (minimal diff, matches existing page-shell pattern); sitemap priorities 1.0 landing > 0.8 pages > 0.7 devlog index > 0.6 individual post (signals crawl weight).
acceptance: |
  `/sitemap.xml` includes `/devlog` + each devlog slug w/ correct `lastModified`; footer renders `/devlog` + `/feed.xml` on every route; `npm run validate:web` + `npm run validate:all` green.
depends_on: 
  - TECH-192
  - TECH-194
depends_on_raw: "**TECH-192** (archived), **TECH-194** (archived)"
