notes: |
  Stage 1.3 Phase 3 opener landed inline in `BlipVoice.Render`. α pre-compute outside loop — `kind == LowPass` → `1 - (float)Math.Exp(-2π * cutoffHz / sampleRate)` clamped `[0,1]`; `kind == None` → `1f` literal (no `Math.Exp`). Per-sample recursion `state.filterZ1 += α * (x - state.filterZ1); buffer[i] = state.filterZ1;` — single kernel, branchless, 1 mul + 1 add + 1 store. `ref BlipVoiceState state` threaded via TECH-121 driver; zero per-sample allocs. **Decisions:** α clamp guards `cutoffHz ≥ sampleRate/2` w/o branching on input; passthrough via α = 1 (not `if kind == None`) keeps single kernel matching TECH-121 "no per-sample branches" invariant; narrow `Math.Exp` `double` → `float` once outside loop to avoid repeated widening (state is `float`). Master plan Stage 1.3 T1.3.5 flipped to Done.
acceptance: |
  LP math inline in driver; `None` passthrough branchless; `npm run validate:all` green.
depends_on: 
  - TECH-116
