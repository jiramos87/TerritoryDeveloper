notes: |
  `BlipVoice.Render` gains 11-param overload — existing 7-param signature + `float[]? d0, float[]? d1, float[]? d2, float[]? d3` appended. Existing 7-param delegates w/ all-null (back-compat shim; `BlipNoAllocTests` + `BlipDeterminismTests` untouched callers stay green). `BlipFxChain.ProcessFx` signature extended w/ `float[]? delayBuf, int bufLen, ref int writePos` per-call params; null-guard in every FX case (memoryless kinds ignore). `BlipBaker.BakeOrGet` pre-leases up to 4 buffers from `_catalog._delayPool.Lease(sampleRate, 50f)` (50 ms ceiling covers comb+chorus+flanger range); passes to Render; `finally { pool.Return(buf) }` unconditionally. Delay-line kernel bodies still passthrough — behavior change lands in **TECH-272..274**. Zero managed alloc inside Render.
acceptance: |
  11-param Render overload present; 7-param shim delegates; `ProcessFx` signature extended w/ null-guards; `BlipBaker.BakeOrGet` lease+return via `finally`; `BlipNoAllocTests` + `BlipDeterminismTests` + `BlipBakerTests` green; `npm run unity:compile-check` + `npm run validate:all` exit 0.
