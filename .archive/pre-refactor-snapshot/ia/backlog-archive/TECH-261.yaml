notes: |
  **Completed (verified — `/project-spec-close`).** `drizzle-orm` + `drizzle-kit` pinned in `web/package.json` (`dependencies` + `devDependencies`); `web/lib/db/schema.ts` (new) exports 4 typed `pgTable` consts — `user` (uuid PK `defaultRandom()` + `email text unique not null` + `passwordHash text not null` (argon2id digest) + `createdAt timestamptz defaultNow()`), `session` (uuid PK + `userId uuid FK→user.id onDelete cascade` + `expiresAt timestamptz not null` + `token text not null`), `save` (uuid PK + `userId FK cascade` + `data jsonb $type<unknown>() not null` + `updatedAt timestamptz defaultNow()`), `entitlement` (uuid PK + `userId FK cascade` + `tier text not null` + `grantedAt timestamptz defaultNow()`) + 8 inferred types via `$inferSelect` / `$inferInsert`. Column shape matches Stage 5.1 auth-lib lock (TECH-253 Decision Log: roll-own JWT + sessions, `SESSION_COOKIE_NAME=portal_session`, `SESSION_LIFETIME_DAYS=30`, `@node-rs/argon2`). Decision Log — UUID PKs over bigserial (enumeration leak + Stage 5.1 contract); TIMESTAMPTZ over plain timestamp (Vercel UTC vs Neon session-tz drift); `onDelete: 'cascade'` over restrict (GDPR account-delete intent, saves app-level cascade scripts later); `$type<unknown>()` over `Record<string, unknown>` on `save.data` (refined by TECH-263+ when save shape locks). No migrations run; `drizzle` adapter wrap deferred to TECH-262. Validate: `cd web && npm run typecheck` green; `npm run validate:all` green; `npm run validate:web` green. Stage 5.2 Phase 1 first Exit bullet satisfied.
acceptance: ""
depends_on: 
  - TECH-254
