notes: |
  Added optional `pctColumn?: PctColumnConfig<T>` prop + exported `PctColumnConfig<T>` type (`{ dataKey: keyof T; label?: string; max?: number }`). Prop set ‚Üí trailing `<th>` (`label ?? 'Progress'`, no `aria-sort` per ¬ß2.2) + trailing `<td>` rendering `<StatBar label value max />` w/ fallbacks `label='Progress'` + `max=100`. Module-local `toFiniteNumber(raw)` coerces non-numeric / `NaN` / `undefined` ‚Üí `0` at boundary (guards `Math.max/min` `NaN` propagation in StatBar). DataTable passes raw `value` + `max` (not pre-computed pct) ‚Äî StatBar owns `[0,100]` clamp + `max ‚â§ 0 ‚Üí 0` + `(value/max)*100` as single source of truth; backlog snippet (`value={raw/max*100}`) reconciled in Decision Log. Prop absent ‚Üí zero DOM change; existing `Column<T>` / generic / `statusCell` / `getRowKey` contract preserved. Import `StatBar` from `./StatBar`. Feeds Stage 4.2 dashboard pct rendering (TECH-233 + TECH-234).
acceptance: |
  `pctColumn` typed + optional; `PctColumnConfig<T>` exported; existing call sites compile unchanged; trailing header + StatBar render gated on prop; `NaN` guard holds; `npm run validate:all` green.
