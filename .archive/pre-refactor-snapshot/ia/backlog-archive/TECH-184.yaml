files: 
  - web/lib/glossary/import.ts
  - web/lib/glossary/types.ts
notes: |
  Stage 2.2 Phase 1 opener. `loadGlossaryTerms()` reads `ia/specs/glossary.md` via `resolveGlossaryPath()` (cwd duality — probe repo-root `ia/specs/glossary.md` via `fs.access`, fallback `../ia/specs/glossary.md` for `web/` cwd; mirrors `web/lib/mdx/loader.ts`). Splits by `^## ` headings, drops `Index (quick skim)` + `Planned terminology`; per section scans `|`-delimited rows, skips header + separator; strips `**` from term cell, keeps definition verbatim, discards Spec column (3rd). Slug derivation — lower-case, drop `[…]` bracketed suffix, replace non-alphanumeric runs w/ `-`, trim; deterministic `-2`/`-3` dedup preserves source order. Emits `GlossaryTerm[] = { term, definition, slug, category }` (category required, not optional — every row has a `## Heading` parent). Decision Log — `category` required in type (TECH-185 auto-index groups by it); skip `## Planned terminology` (glossary header flags non-authoritative); regex parse over `remark-parse` (zero deps, glossary format internally controlled); deterministic `-N` slug dedup preserves source order (avoid alphabetical reorder breaking wiki links on glossary edits).
acceptance: |
  `loadGlossaryTerms()` returns typed `GlossaryTerm[]`; `Spec` column absent from output; slugs kebab-case `^[a-z0-9]+(-[a-z0-9]+)*$`; runs from repo-root + `web/` cwd; `Index (quick skim)` + `Planned terminology` skipped; `npm run validate:web` + `npm run validate:all` green.
depends_on: 
  - TECH-164
depends_on_raw: "**TECH-164** (archived — cwd duality guard pattern)"
