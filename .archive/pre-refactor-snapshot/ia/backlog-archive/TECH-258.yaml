notes: |
  Appended 12 blittable `float` fields at struct tail of `BlipVoiceState` — slot-grouped triplets `(dcZ1_N, dcY1_N, ringModPhase_N)` for slots 0..3 (DC blocker input/output z-1 + ring-mod carrier phase). Grouped by slot (not by kind) for cache locality — TECH-260 unrolled dispatch reads all three per-slot fields per `BlipFxChain.ProcessFx` call. Flat-field pattern (not nested `BlipFxVoiceSlot` struct) matches existing `phaseA..D` precedent + avoids `ref state.fxSlot0.dcZ1` indirection against TECH-259 `ref float` kernel params. No `readonly` modifier — `ref`-writable required by TECH-259. No explicit `ResetFxState()` — relies on caller zero-init + `default(BlipVoiceState) = 0f` (per `ia/specs/audio-blip.md §3.2`). Each field carries `<summary>` XML pointing to TECH-259 consumer; inline comment block documents slot-triplet layout. Zero behavior change — `BlipVoice.Render` untouched; MVP golden fixtures stay bit-exact (FX wire lands in TECH-260). Closes Stage 5.1 Phase 1 Exit bullet "`BlipVoiceState` extended w/ FX state". Feeds **TECH-259** + **TECH-260**.
acceptance: |
  12 new float fields present w/ exact names; `BlipVoiceState` still blittable (unmanaged-struct compile); `default(BlipVoiceState) = 0f` contract preserved; `npm run unity:compile-check` green; `npm run validate:all` exit 0.
