notes: |
  Replace Stage 5.1 Chorus + Flanger passthrough stubs w/ 2-tap LFO-modulated delay kernels. Chorus rate `p0` Hz, depth `p1` ms, mix `p2`; symmetric taps `(writePos - center ± lfoOffset) mod bufLen`; `x = (1 - p2) * x + p2 * 0.5 * (tap0 + tap1)`. Flanger identical body, depth clamped `[1f, 10f]` ms via `OnValidate`. Per-slot LFO phase reuses `ringModPhase_N` (slot-private — no cross-slot conflict; warn loop dropped per DL). `ProcessFx` signature gained `float p2`; 8 call sites in `BlipVoice.Render` (4 deterministic + 4 live) updated to forward `param2`. Nearest-neighbour taps; linear interp deferred to Stage 5.3+.
acceptance: |
  Chorus + Flanger kernels per spec §5.2; Flanger depth clamp 1..10 ms; `BlipFxChainTests.Chorus_WetMixNonZero` + `Flanger_DepthClampedTo10ms` green; `npm run unity:compile-check` + `npm run validate:all` exit 0.
