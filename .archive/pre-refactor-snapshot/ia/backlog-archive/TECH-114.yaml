notes: |
  Blip master-plan Stage 1.2 Phase 2 opener. `BlipPatchFlat` readonly struct mirrors `BlipPatch` scalars; zero managed refs (no class / string / `AnimationCurve` / `AudioMixerGroup`). `AudioMixerGroup` kept on SO + `BlipMixerRouter` parallel map (Step 2) — preserves blittable contract. Nested `BlipOscillatorFlat` / `BlipEnvelopeFlat` / `BlipFilterFlat` readonly structs under `BlipPatchFlat.cs`. Oscillator slots inline triplet (`osc0/osc1/osc2 + oscillatorCount`) — managed array rejected (heap ref breaks blittable); triplet matches `BlipPatch.OnValidate` cap of 3. `mixerGroupIndex` int sentinel defaults `-1` (router overrides post-flatten; avoids nullable). Flatten via ctor `BlipPatchFlat(BlipPatch so, int mixerGroupIndex = -1)` + static `FromSO(BlipPatch)` helper — runs main-thread only on `BlipCatalog.Awake`. `patchHash` slot deferred to TECH-115 (appended w/o layout churn). Consumed by Stage 1.3 `BlipVoice.Render(in BlipPatchFlat, …)` + Step 2 `BlipBaker.BakeOrGet(in BlipPatchFlat, …)`. Orchestrator: [`projects/blip-master-plan.md`](../ia/projects/blip-master-plan.md) Stage 1.2.
acceptance: |
  `BlipPatchFlat` + 3 nested flats compile as readonly structs; zero managed refs; `unity:compile-check` + `validate:all` green
