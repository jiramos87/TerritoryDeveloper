notes: |
  Stage 1.2 Phase 3 opener. First archetype YAML — `id: building_residential_small_v1`, `class: residential`, `footprint: [1,1]`, `terrain: flat`, `levels: 2`, `seed: 42`, `variants: 4`. Composition: `iso_cube × 2` (wall_brick_red, stacked via `offset_z`) + `iso_prism` (roof_tile_brown, pitch=0.5, axis=ns, `offset_z: 32`). `palette: residential` (stub material names → RGB fallback until Stage 1.3 palette JSON lands). `diffusion.enabled: false`. Canvas `(64, 64)` via `canvas_size(1, 1, extra_h=44)` + min-64 clamp in `compose.py`. Decision Log — 2 stacked cubes over single tall cube (exercises `offset_z` path); `offset_z:` key over `z:` (matches archived `compose.py` signature); `variants:` under `output:` block (matches exploration §8); drop `x0/y0` from composition entries (composer derives SE-corner anchor from footprint); `h` values sized for 64-px canvas (two 16-px half-levels + 12-px roof fits clamp).
acceptance: |
  YAML validates via **TECH-148** loader; `render building_residential_small` produces 4 variant PNGs at `(64, 64)`; `npm run validate:all` green.
