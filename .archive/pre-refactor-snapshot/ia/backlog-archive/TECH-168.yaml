notes: |
  Stage 2.1 Phase 3 closer. `web/app/opengraph-image.tsx` via `next/og` `ImageResponse` — 1200x630 PNG, palette-token bg (`bg-canvas`) + accent (`raw.green` 4px rule) + title (`text-primary` mono) + tagline (`text-muted` sans); named exports `alt`/`size`/`contentType`. `web/lib/site/metadata.ts` (new) centralizes `siteTitle` + `siteTagline`. `web/app/layout.tsx` `metadata` extended w/ `metadataBase: new URL(getBaseUrl())` + default `title`/`template` + `description` + `openGraph` base. Each public RSC (`/`, `/about`, `/install`, `/history`) exports async `generateMetadata` via `loadMdxPage(slug)` → `Metadata { title, description, openGraph(title/description/url/type:"article"), twitter(card:"summary_large_image") }`. Canonical URL from `getBaseUrl()` + slug. Decision Log — single site-level OG card (no per-slug dynamic OG at MVP); centralize site strings in `lib/site/metadata.ts` (single source for OG card + layout default); `metadataBase` pinned to `getBaseUrl()` for absolute OG URLs across envs. Open Question #1 resolved w/ proposed tagline `"A city builder where geography shapes every decision."`.
acceptance: |
  `/opengraph-image` returns 1200x630 PNG; each page emits `<meta og:*>` + `<title>`; `npm run validate:web` green.
