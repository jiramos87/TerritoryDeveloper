  Static **HTML** generator parses **orchestrator document** Markdown (`ia/projects/*master-plan*.md`) â†’ emits single `docs/progress.html` w/ per-plan progress cards (green bar, current step/stage/phase/task, status breakdown, phase checklist, sibling-coordination notes) + overall combined header. Pure fn parser + renderer â€” same bytes in â†’ same HTML bytes out (no wall-clock, no git-log, no `Date.now`); `git diff docs/progress.html` empty on repeat runs. Inline CSS, zero JS deps. Regen wired into `project-stage-close` + `project-spec-close` skills so lifecycle events auto-refresh output (no CI / watcher / pre-commit). Parsing contract + hook contract documented in `tools/progress-tracker/README.md`. Decisions: drop git-log timestamp (breaks determinism); lifecycle-skill hook over watcher (state flips are discrete lifecycle events); static HTML over SPA (zero deps). Orchestrator doc rules per `ia/rules/orchestrator-vs-spec.md`.
