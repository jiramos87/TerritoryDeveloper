notes: |
  `BlipEngine.StopAll(BlipId id)` body ‚Äî `AssertMainThread()` ‚Üí `ResolveCatalog()` / `ResolvePlayer()` null-silent mirrors `Play` gate; `!cat.IsReady` ‚Üí silent return; `int patchHash = cat.PatchHash(id)` ‚Üí `HashSet<AudioClip> hits = new(cat.Baker.EnumerateClipsForPatchHash(patchHash))` ‚Üí iterate `player.Pool` ‚Üí `src.Stop()` where `src.isPlaying && hits.Contains(src.clip)`. Added `internal IEnumerable<AudioClip> BlipBaker.EnumerateClipsForPatchHash(int)` ‚Äî scans `_index` keys, yields `entry.clip` on `key.patchHash` match, no LRU mutation. Added `internal IReadOnlyList<AudioSource> BlipPlayer.Pool => _pool`. Decision Log ‚Äî `internal Pool` accessor over `StopMatching(Predicate<AudioClip>)` callback (same-namespace trust, scales to future ops); `IEnumerable<AudioClip>` return avoids per-call allocation (caller materializes `HashSet`); hard `AudioSource.Stop()` no fade (master plan Stage 2.3 exit; fade requires voice-state tracker punted post-MVP). Non-destructive ‚Äî LRU cache order + byte total untouched.
acceptance: |
  `StopAll` halts matching voices via ref-equality on `source.clip`; non-matching voices untouched (isolation via `HashSet.Contains`); baker LRU unchanged; catalog/player null or `!IsReady` ‚Üí silent no-op; `npm run unity:compile-check` green.
