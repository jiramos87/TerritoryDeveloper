notes: |
  Post-envelope FX dispatch in `BlipVoice.Render` — unrolled 4-slot `if (patch.fxSlotCount >= N) BlipFxChain.ProcessFx(ref x, patch.fxN.kind, patch.fxN.param0, patch.fxN.param1, ref state.dcZ1_N, ref state.dcY1_N, ref state.ringModPhase_N, sampleRate)` for N in 1..4. Mirror block wired into both deterministic (lines ~162) and live (lines ~254) per-sample loops. Empty chain (`fxSlotCount == 0`) fast-exits through all four `if` guards — MVP golden fixtures stay bit-exact (no fixture regeneration). `BlipNoAllocTests.Render_WithFxChain_ZeroManagedAlloc` — 2-slot BitCrush+DcBlocker patch; 3 warm-up + 10 measure w/ `GC.GetAllocatedBytesForCurrentThread`; delta/call ≤ 0. Decision Log: POST-envelope PRE-filter placement (matches Stage 5.1 Exit; alt POST-filter rejected — would bypass LP for DcBlocker's HP action); unrolled `if` cascade vs `for` loop (blittable + zero-alloc matches oscillator inline-triplet precedent); mirror into both branches vs shared helper (existing per-sample cores already duplicated — extract outside Stage 5.1 scope); new test lives alongside `Render_SteadyState_ZeroManagedAlloc` (tight isolation on failure). Closes Stage 5.1 T5.1.5 Exit bullet "BlipVoice.Render FX loop + BlipNoAllocTests still green" + Stage 5.1 as a whole.
acceptance: |
  FX loop wired post-envelope in both deterministic + live branches; empty chain passthrough (MVP goldens green); new NoAlloc test green; existing `BlipNoAllocTests` + `BlipGoldenFixtureTests` + `BlipDeterminismTests` still green; `npm run unity:compile-check` green; `npm run validate:all` exit 0.
