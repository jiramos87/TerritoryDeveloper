notes: |
  Four phases: (1) `city_metrics_history` — per-tick city metric snapshots for FEAT-51 dashboard and **TECH-31** **test mode** **city history** assertions — **program stage 31d** in [`projects/TECH-31-agent-scenario-generator-program.md`](projects/TECH-31-agent-scenario-generator-program.md) tracks ordering vs **TECH-31** **31a**–**31c**. (2) `city_events` — financial event sourcing for **monthly maintenance** and other treasury movements (see **glossary** **Monthly maintenance**). (3) `grid_snapshots` — periodic grid state for diffing/analysis. (4) `buildings` table — individual building identity for FEAT-08 density evolution. All fire-and-forget; game fully playable without Postgres. Scenarios remain **save**-authoritative; DB rows are observability, not the scenario file.
acceptance: |
  Phase 1 at minimum: metrics recorded per tick, MCP query tool returns time-series; game playable without DB
