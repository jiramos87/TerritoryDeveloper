notes: |
  Existing **buildings** evolve to larger versions based on **zone density** and **desirability**. Includes spatial **pollution** → **desirability** penalty: **cells** near polluting sources (industrial **buildings**, power plants) receive a per-cell **desirability** malus via radius-based diffusion, discouraging residential evolution and **AUTO** zoning near polluters. Extends the city-wide **pollution** aggregate (shipped) into a per-cell spatial model. (**TECH-15** / **TECH-16** — performance + harness work — live under **§ Agent ↔ Unity & MCP context lane**.)
