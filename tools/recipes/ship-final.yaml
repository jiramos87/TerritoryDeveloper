recipe: ship-final
description: >-
  Close a master-plan version. Phases: assert sections closed ‚Üí assert all
  stages done (no `partial`) ‚Üí plan-scoped `validate:fast --diff-paths` on
  union of paths in `ia_task_commits` for slug (HEAD-diff fallback when DB
  unreachable) ‚Üí annotated git tag `{slug}-v{N}` (local only) ‚Üí
  `master_plan_close` MCP flips `closed_at` ‚Üí
  `journal_append(payload_kind=version_close)`. Final gate of ship-protocol
  cycle. Mechanical ‚Äî no decisions.
inputs:
  type: object
  additionalProperties: false
  required:
    - slug
  properties:
    slug:
      type: string
      description: Master-plan slug (matches ia_master_plans.slug).
    session_id:
      type: string
      description: >-
        Optional agent session id for journal_append. Defaults to recipe-run
        auto-generated id.
    actor:
      type: string
      description: Optional actor for journal payload.
steps:
  - id: load_plan
    description: >-
      Phase 1 ‚Äî load master-plan row. Captures version + closed_at + stages[].
    mcp: master_plan_state
    args:
      slug: ${inputs.slug}

  - id: assert_sections_closed
    description: >-
      Phase 2 ‚Äî assert zero open ia_section_claims rows for slug. Recipe stops
      on any open section claim.
    bash: tools/scripts/recipe-engine/ship-final/assert-sections-closed.sh
    args:
      slug: ${inputs.slug}

  - id: assert_stages_done
    description: >-
      Phase 3 ‚Äî assert every stage status equals `done`. Stops on any `partial`,
      `pending`, or `in_progress`.
    bash: tools/scripts/recipe-engine/ship-final/assert-stages-done.sh
    args:
      slug: ${inputs.slug}
      stages: ${load_plan.stages}

  - id: cumulative_validate
    description: >-
      Phase 4 ‚Äî plan-scoped `validate:fast`. Queries `ia_task_commits` for
      this plan's task shas, unions paths via `git show --name-only`, runs
      `npm run validate:fast -- --diff-paths <csv>` (path-map scoped runner,
      TECH-12640). Drift in unrelated plans does NOT block close. Fallback:
      `validate:fast` HEAD-diff when DB unreachable. Stops on non-zero exit.
    bash: tools/scripts/recipe-engine/ship-final/cumulative-validate.sh
    args:
      slug: ${inputs.slug}
      version: ${load_plan.version}

  - id: git_tag
    description: >-
      Phase 5 ‚Äî annotated git tag `{slug}-v{N}`. Local only ‚Äî never pushed.
      Captures HEAD sha for journal payload.
    bash: tools/scripts/recipe-engine/ship-final/git-tag.sh
    args:
      slug: ${inputs.slug}
      version: ${load_plan.version}

  - id: close_plan
    description: >-
      Phase 6 ‚Äî flip ia_master_plans.closed_at = now(). Must precede
      journal_append for audit ordering. Idempotent ‚Äî returns
      `version_already_closed` when closed_at non-null.
    mcp: master_plan_close
    args:
      slug: ${inputs.slug}

  - id: journal_close
    description: >-
      Phase 7 ‚Äî append version_close row to ia_ship_stage_journal. Payload:
      {plan_slug, version, tag, sha, validate_all_result, sections_closed[]}.
    mcp: journal_append
    args:
      session_id: ${inputs.session_id}
      slug: ${inputs.slug}
      phase: version-close
      payload_kind: version_close
      payload:
        plan_slug: ${inputs.slug}
        version: ${load_plan.version}
        tag: ${git_tag.tag}
        sha: ${git_tag.sha}
        validate_all_result: ${cumulative_validate.result}
        sections_closed: ${assert_sections_closed.sections_closed}

outputs:
  slug: ${inputs.slug}
  version: ${load_plan.version}
  tag: ${git_tag.tag}
  sha: ${git_tag.sha}
  closed_at: ${close_plan.closed_at}
  journal_id: ${journal_close.id}
