recipe: section-closeout
description: >-
  Close a parallel-carcass section: drift gate → DB closeout + claim release.
  V2 row-only — same branch + same worktree, no merge, no worktree teardown.
  Per parallel-carcass §6.4 (V2 rewrite) + DEC-A19 Phase E.
inputs:
  type: object
  additionalProperties: false
  required:
    - slug
    - section_id
  properties:
    slug:
      type: string
      description: Master-plan slug (matches `ia_master_plans.slug`).
    section_id:
      type: string
      description: Section id (matches `ia_stages.section_id` for member stages).
    actor:
      type: string
      description: Optional actor for change_log row.
    commit_sha:
      type: string
      description: Optional commit_sha for change_log row.
steps:
  - id: drift_scan
    description: >-
      Phase 1 — intra-plan arch drift scan. Must return 0 affected stages;
      next step fails recipe when drift found.
    mcp: arch_drift_scan
    args:
      scope: intra-plan
      plan_id: ${inputs.slug}
      section_id: ${inputs.section_id}

  - id: drift_gate
    description: >-
      Phase 1b — assert 0 affected stages from drift scan. Fails recipe when
      any stage carries unresolved arch drift.
    bash: tools/scripts/recipe-engine/section-closeout/assert-zero-drift.sh
    args:
      affected_stages: ${drift_scan.affected_stages}

  - id: closeout_apply
    description: >-
      Phase 2 — DB closeout: assert all stages done, append change_log row
      (kind=section_done), release section claim + cascade stage claims by
      row key alone (V2 row-only — any caller).
    mcp: section_closeout_apply
    args:
      slug: ${inputs.slug}
      section_id: ${inputs.section_id}
      actor: ${inputs.actor}
      commit_sha: ${inputs.commit_sha}

outputs:
  drift_affected: ${drift_scan.affected_stages}
  drift_gate: ${drift_gate.stdout}
  closeout_applied: ${closeout_apply.applied}
  change_log_entry_id: ${closeout_apply.change_log_entry_id}
  section_claim_released: ${closeout_apply.section_claim_released}
  cascaded_stage_releases: ${closeout_apply.cascaded_stage_releases}
