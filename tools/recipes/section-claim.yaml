recipe: section-claim
description: >-
  Take the section claim row in `ia_section_claims`. V2 row-only — no holder
  identity, no worktree, no per-section branch. Same branch + same worktree
  model. The section IS the holder; concurrent contention enforced by
  PRIMARY KEY. Heartbeats happen externally — `/ship-stage` Pass A iterations
  call `claim_heartbeat` MCP. Recipe is one-shot. Per parallel-carcass §6.4
  (V2 rewrite) + DEC-A19 Phase E.
inputs:
  type: object
  additionalProperties: false
  required:
    - slug
    - section_id
  properties:
    slug:
      type: string
      description: Master-plan slug (matches `ia_master_plans.slug`).
    section_id:
      type: string
      description: Section id (matches `ia_stages.section_id` for member stages).
steps:
  - id: claim
    description: >-
      Phase 1 — atomic mutex claim via MCP. Fails `section_claim_held` only on
      concurrent INSERT race. Any subsequent caller refreshes the open row
      heartbeat (V2 row-only — section IS the holder).
    mcp: section_claim
    args:
      slug: ${inputs.slug}
      section_id: ${inputs.section_id}

outputs:
  claim_status: ${claim.status}
  claimed_at: ${claim.claimed_at}
  last_heartbeat: ${claim.last_heartbeat}
