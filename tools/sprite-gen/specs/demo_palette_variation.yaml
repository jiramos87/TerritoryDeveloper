id: demo_palette_variation
# Axis 3 probe — palette variation across 6 variants.
# vary.wall.material.values + vary.roof.material.values + vary.ground.material.values
# Geometry held constant (footprint_ratio 0.45, pitch 0.5, h_px 8, seed 11).
# Tests palette plumbing (wall/roof material vary routed via composition[*])
# and ground.material.values (palette-scope via _apply_vary_ground).
class: residential_small
footprint: [1, 1]
terrain: flat
levels: 1
palette: residential
seed: 11
ground:
  material: grass_flat
building:
  footprint_ratio: [0.45, 0.45]
  composition:
    - { type: iso_cube, role: wall, material: wall_brick_red, w: 1, d: 1 }
    - { type: iso_prism, role: roof, material: roof_tile_brown, w: 1, d: 1, h_px: 8, pitch: 0.5, axis: ns, offset_z_role: above_walls }
composition:
  - { type: iso_cube, role: wall, material: wall_brick_red, w: 1, d: 1 }
  - { type: iso_prism, role: roof, material: roof_tile_brown, w: 1, d: 1, h_px: 8, pitch: 0.5, axis: ns, offset_z_role: above_walls }
output:
  name: demo_palette_variation
  variants: 6
variants:
  count: 6
  seed_scope: palette
  vary:
    wall:
      material:
        values: [wall_brick_red, wall_brick_grey, concrete]
    roof:
      material:
        values: [roof_tile_brown, roof_tile_grey, mustard_industrial]
    ground:
      material:
        values: [grass_flat, grass_dense, dirt]
diffusion:
  enabled: false
