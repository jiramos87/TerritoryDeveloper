# Preset: row_houses_3x (TECH-734, Stage 6.6)
# Row of three houses riding Stage 9's parametric `tiled-row-N` slot.
# Consumers reference via `preset: row_houses_3x`; author supplies own
# `id:` + `output.name:`. Renders cleanly once Stage 9 addendum (TECH-744)
# lands — `tiled-row-3` resolves to three evenly-spaced house footprints.
class: residential_small
footprint: [3, 1]
terrain: flat
levels: 1
palette: residential
ground:
  material: grass_flat
  texture:
    density: { min: 0.35, max: 0.65 }
buildings:
  - slot: tiled-row-3
    footprint_ratio: [0.9, 0.55]
    composition:
      - { type: iso_cube, role: wall, material: wall_brick_red, w: 1, d: 1 }
      - { type: iso_prism, role: roof, material: roof_tile_brown, w: 1, d: 1, h_px: 7, pitch: 0.5, axis: ns, offset_z_role: above_walls }
building:
  footprint_ratio: [0.9, 0.55]
  composition:
    - { type: iso_cube, role: wall, material: wall_brick_red, w: 1, d: 1 }
    - { type: iso_prism, role: roof, material: roof_tile_brown, w: 1, d: 1, h_px: 7, pitch: 0.5, axis: ns, offset_z_role: above_walls }
composition:
  - { type: iso_cube, role: wall, material: wall_brick_red, w: 1, d: 1 }
  - { type: iso_prism, role: roof, material: roof_tile_brown, w: 1, d: 1, h_px: 7, pitch: 0.5, axis: ns, offset_z_role: above_walls }
output:
  variants: 4
variants:
  count: 4
  seed_scope: palette+geometry
  vary:
    ground:
      hue_jitter: { min: -6, max: 6 }
      value_jitter: { min: -4, max: 4 }
vary:
  facade:
    strategy: per_tile
    material:
      values: [wall_brick_red, wall_stucco_tan, wall_siding_white]
  roof:
    strategy: per_tile
    material:
      values: [roof_tile_brown, roof_tile_grey, roof_tile_red]
diffusion:
  enabled: false
