# Preset: suburban_house_with_yard (TECH-732, Stage 6.6)
# Residential-small house on a grass yard with textured ground.
# Consumers reference via `preset: suburban_house_with_yard`; author supplies
# own `id:` + `output.name:`. `vary:` block covers roof / facade / ground axes.
class: residential_small
footprint: [1, 1]
terrain: flat
levels: 1
palette: residential
ground:
  material: grass_flat
  texture:
    density: 0.5
building:
  footprint_ratio: [0.45, 0.45]
  composition:
    - { type: iso_cube, role: wall, material: wall_brick_red, w: 1, d: 1 }
    - { type: iso_prism, role: roof, material: roof_tile_brown, w: 1, d: 1, h_px: 8, pitch: 0.5, axis: ns, offset_z_role: above_walls }
composition:
  - { type: iso_cube, role: wall, material: wall_brick_red, w: 1, d: 1 }
  - { type: iso_prism, role: roof, material: roof_tile_brown, w: 1, d: 1, h_px: 8, pitch: 0.5, axis: ns, offset_z_role: above_walls }
output:
  variants: 4
variants:
  count: 4
  seed_scope: palette+geometry
  vary:
    ground:
      hue_jitter: { min: -8, max: 8 }
      value_jitter: { min: -6, max: 6 }
      texture:
        density: { min: 0.35, max: 0.65 }
vary:
  roof:
    h_px: { min: 6, max: 10 }
  facade:
    material:
      values: [wall_brick_red, wall_stucco_tan, wall_siding_white]
  ground:
    material:
      values: [grass_flat]
diffusion:
  enabled: false
