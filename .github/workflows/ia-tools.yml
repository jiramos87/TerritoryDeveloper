name: IA tools

on:
  push:
    paths:
      - "ia/**"
      - "docs/**"
      - "projects/**"
      - "AGENTS.md"
      - "BACKLOG.md"
      - "ARCHITECTURE.md"
      - "tools/mcp-ia-server/**"
      - "tools/compute-lib/**"
      - ".github/workflows/ia-tools.yml"
      - "package.json"
  pull_request:
    paths:
      - "ia/**"
      - "docs/**"
      - "projects/**"
      - "AGENTS.md"
      - "BACKLOG.md"
      - "ARCHITECTURE.md"
      - "tools/mcp-ia-server/**"
      - "tools/compute-lib/**"
      - ".github/workflows/ia-tools.yml"
      - "package.json"

jobs:
  node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/mcp-ia-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            tools/mcp-ia-server/package-lock.json
            tools/compute-lib/package-lock.json
      - name: Build territory-compute-lib (TECH-37)
        working-directory: tools/compute-lib
        run: npm ci && npm run build
      - run: npm ci
      - run: npm test
      - run: npm run validate:fixtures
      - run: npm run generate:ia-indexes -- --check
