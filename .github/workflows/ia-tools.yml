name: IA tools

on:
  push:
    paths:
      - ".cursor/**"
      - "docs/**"
      - "projects/**"
      - "AGENTS.md"
      - "BACKLOG.md"
      - "ARCHITECTURE.md"
      - "tools/mcp-ia-server/**"
      - "tools/validate-dead-project-spec-paths.mjs"
      - ".github/workflows/ia-tools.yml"
      - "package.json"
  pull_request:
    paths:
      - ".cursor/**"
      - "docs/**"
      - "projects/**"
      - "AGENTS.md"
      - "BACKLOG.md"
      - "ARCHITECTURE.md"
      - "tools/mcp-ia-server/**"
      - "tools/validate-dead-project-spec-paths.mjs"
      - ".github/workflows/ia-tools.yml"
      - "package.json"

jobs:
  node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/mcp-ia-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tools/mcp-ia-server/package-lock.json
      - name: Dead project spec paths (TECH-50)
        working-directory: ${{ github.workspace }}
        run: node tools/validate-dead-project-spec-paths.mjs
      - run: npm ci
      - run: npm test
      - run: npm run validate:fixtures
      - run: npm run generate:ia-indexes -- --check
