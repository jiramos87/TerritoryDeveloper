notes: |
  Gate **Stage** decomposition on bulk-verify + bulk-code-review feasibility of task cluster.
  New rule `ia/rules/stage-sizing-gate.md` carries heuristics: subsystem cohesion, verify-path
  overlap (Path A scenario / Path B bridge cluster), diff LOC budget (soft ~800 LOC / 25 files),
  depends-on DAG linearity, invariant-hotspot density, compile-break probability. NOT an N-cap;
  existing cardinality gate (≥2 hard / ≤6 soft) stays. Hook `stage-decompose` Phase N (post
  task-sizing) + `stage-file-plan` Phase 0. Fail → recurse split Stage X.A / X.B + reauthor.
  Empirical rollout over 2-3 Stages before sibling `/ship-stage` expansion work. Findings
  source: `docs/stage-scoped-verify-review-findings.md`. Distinct from lifecycle-refactor F2
  sizing gate (cache-block token floor) — this is task-cluster scope.
