notes: |
  Hook scripts `bash-denylist.sh` + `cs-edit-reminder.sh` currently fork `python3` per tool call to extract JSON (`tool_input.command` / `tool_input.file_path`). macOS fork cost ~20–60 ms × N tool calls per session = seconds of wall latency. Drop python3 entirely — `jq` new primary (handles escaped quotes natively, resolves BL-2 correctness risk), existing sed branch stays as fallback with conservative-deny on ambiguity. Document `jq` as dev-env prereq in `CLAUDE.md §4 Hooks`. Add test fixture: stdin JSON with denylisted command → exit 2 (NB-4). Audit item D3, `docs/session-token-latency-audit-exploration.md` §Theme D. Ship-order last of Theme-0 FREEZE batch (B7 → D1 → E1 → E2 → D3). FREEZE-safe — zero runtime C# / lifecycle-refactor surface touched. Hook denylist security boundary unchanged (exit 2 on all current deny patterns).
acceptance: |
  `bash-denylist.sh` + `cs-edit-reminder.sh` drop python3 branch entirely; `jq` primary + sed fallback path active; denylist security boundary unchanged (deny patterns still exit 2); test fixture added under `tools/scripts/claude-hooks/` proves denylisted stdin JSON → exit 2; `jq` documented as dev-env prereq in `CLAUDE.md §4 Hooks`; benchmark shows ~20–60 ms saved per call; `validate:all` green
