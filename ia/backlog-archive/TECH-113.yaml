notes: |
  Blip master-plan Stage 1.2 Phase 1 third task. `OnValidate` body on `BlipPatch` clamps AHDSR timings + range guards: `attackMs` / `releaseMs` ≥ 1 ms (≈48 samples @ 48 kHz mix rate — kills snap-onset click); `decayMs` ≥ 0 ms (allows instant Attack → Sustain transition — sustain-only patches via A=1 / D=0 / R=1); `sustainLevel` `Mathf.Clamp01`; `variantCount` 1..8; `voiceLimit` 1..16; `cooldownMs` ≥ 0. Oscillator array resize guard — `oscillators[]` length capped at 3 via `Array.Resize` (matches `BlipPatchFlat` MVP budget — TECH-114). Decision: `decayMs` clamp ≥ 0 (not ≥ 1 as Backlog Notes initially said) — contradiction w/ sustain-only fallback clause resolved in favor of fallback. Authoring-only pass; runtime flatten + `BlipVoice.Render` never re-clamp. TECH-115 later appends `patchHash = ComputeHash()` at bottom of same `OnValidate` body. Orchestrator: [`projects/blip-master-plan.md`](../ia/projects/blip-master-plan.md) Stage 1.2.
acceptance: |
  six clamp rules + oscillator resize enforced; sustain-only case authors cleanly; `unity:compile-check` + `validate:all` green
depends_on: 
  - TECH-111
  - TECH-112
depends_on_raw: "**TECH-111**, **TECH-112**"
