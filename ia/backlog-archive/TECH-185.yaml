  - web/lib/wiki/slugs.ts
  - web/components/GlossaryShell.tsx
notes: |
  Stage 2.2 Phase 1 closer. Catch-all `/wiki/[...slug]` RSC resolves MDX via `loadMdxContent('wiki', slug)` first, falls back to glossary-derived `<GlossaryShell>` when slug matches imported `GlossaryTerm`, else `notFound()`. `/wiki` auto-index uses `DataTable` w/ Category column (single-table pattern matches `/history`). `web/lib/wiki/slugs.ts` `listWikiSlugs()` centralizes MDX glob + glossary union (MDX wins on collision). `generateStaticParams` unions both sources — build prerenders 157 wiki routes (4 MDX + 153 glossary slugs) via Next 15 async params idiom. Seed `web/content/wiki/README.mdx` proves loader happy path. Decision Log — single `DataTable` w/ Category column (not table-per-category, matches `/history` TECH-166); MDX wins on slug collision (hand-authored overrides glossary shell, enables editorial enrichment path); extract `listWikiSlugs` helper (avoid double-loading glossary); `notFound()` over custom 404 render (Next.js idiom).
acceptance: |
  `/wiki` index lists glossary + wiki MDX rows grouped by category; `/wiki/{glossary-term-slug}` renders definition shell; `/wiki/readme` renders seed MDX; `generateStaticParams` enumerates both sources; `npm run validate:web` + `npm run validate:all` green.
depends_on: 
  - TECH-184
  - TECH-164
  - TECH-162
