  - [ ] `python3 -m src bootstrap-variants <stem> --from-signature` exits 0 when signature exists
  - [ ] Writes `vary:` block into `tools/sprite-gen/specs/<stem>.yaml`
  - [ ] Preserves author-authored keys (merge, not overwrite)
  - [ ] Exits non-zero with helpful message when signature missing
