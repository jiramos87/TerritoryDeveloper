notes: |
  New CLI subcommand `python3 -m src bootstrap-variants <stem> --from-signature`. Reads `signatures/<class>.signature.json` (class derived from spec), writes sensible `vary:` defaults into the named spec (e.g. `vary.roof.h_px` from signature silhouette band). Opt-in; never auto-rewrites during render. Consumes L7.
