title: "Diagonal / corner-up land slopes vs roads: design closure (2026-04-01)"
priority: medium
status: closed
section: Recent archive (moved from BACKLOG.md, 2026-04-10)
spec: ia/specs/roads-system.md` (land slope stroke policy, route-first paragraph), `ia/specs/isometric-geography-system.md` §3.3.3–§3.3.4, §13.10
