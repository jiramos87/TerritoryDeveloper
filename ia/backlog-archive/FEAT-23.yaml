notes: |
  Replaced unbounded `int` happiness accumulator with normalized 0–100 float score recalculated each simulation tick from 6 weighted factors (employment, tax burden, service coverage stub, forest bonus, development base, pollution penalty). Convergence rate scales with population. Introduced foundational city-wide **pollution** model (industrial buildings + power plants − forest absorption). Happiness feeds back into **demand (R / C / I)** via multiplier in `DemandManager`. Old saves clamp happiness to 0–100 on load. Migrated: **glossary** (Happiness, Pollution), **mgrs** §Demand + §World, **ARCHITECTURE.md** dependency table.
