notes: |
  Implement `TryDraw(subTypeId, amount)` w/ Q4 block-before-deduct: returns false if `subTypeId < 0 || subTypeId > 6`; false if `currentMonthRemaining[subTypeId] < amount`; false if `!treasuryFloorClamp.CanAfford(amount)`. On success, `currentMonthRemaining[subTypeId] -= amount` + `treasuryFloorClamp.TrySpend(amount, "S envelope draw")` then return true. Implement `MonthlyReset()`: for each i in 0..6, `currentMonthRemaining[i] = (int)(globalMonthlyCap * envelopePct[i])`. Call `MonthlyReset` from `EconomyManager.ProcessDailyEconomy` on month-first-day tick (alongside tax + maintenance).
acceptance: |
  `TryDraw` short-circuits on envelope OR treasury check w/o mutation. `MonthlyReset` seeds remaining per envelope × cap. Month-first tick invokes reset. `unity:compile-check` green. Test coverage lands in TECH-425.
