notes: |
  Plain C# class (no MonoBehaviour): parallel `float[]` ring buffers keyed by `StatKey`; `int RingCapacity` default 256 (city scale — dormant scales use 64 in Stage 3.1). API: `Publish(StatKey, float delta)` accumulates running value on tick; `Set(StatKey, float value)` overwrites; `FlushToSeries()` writes current running value to ring entry + resets accumulator (called by `CityStatsFacade.EndTick` in Stage 1.2); `GetScalar(StatKey) → float` returns running value; `GetSeries(StatKey, int windowTicks) → float[]` returns last N ring entries newest-last. No Unity deps — testable in plain NUnit. Composed into `CityStatsFacade` (Stage 1.2) + `RegionStatsFacade` / `CountryStatsFacade` (Stage 3.1). Invariants #4 #6 respected (no singleton, not on `GridManager`).
acceptance: |
  `ColumnarStatsStore.cs` compiles; ring capacity configurable w/ default 256; `Publish` / `Set` / `FlushToSeries` / `GetScalar` / `GetSeries` methods match Stage 1.1 Exit signatures; no Unity dependency (plain C#); `npm run unity:compile-check` clean; `npm run validate:all` clean.
