notes: |
  `unity-run-tests.sh --platform {editmode|playmode}` wraps `Unity -batchmode -runTests`; Node XML parser (`parse-nunit-xml.mjs`) emits `Passed/Failed/Errors/Skipped` + `FAILED: <fullname>` list; exits non-zero on any failure. `--quit-editor-first` guard mirrors `unity:testmode-batch`. npm aliases `unity:test-editmode` / `unity:test-playmode` / `unity:test-all`. Hooked into `verify:local` (not `validate:all` — CI stays Unity-free). Two-tier NUnit strategy decision: Tier A batchmode shipped; Tier B bridge `run_nunit_tests` via `TestRunnerApi` deferred (Editor-open dev-machine path) — deferral note appended to `docs/agent-led-verification-policy.md`.
acceptance: |
  runner script exec-bit + dotenv + editor-helpers wired; stdout contract `Passed: N  Failed: M  Errors: K  Skipped: S` + failed `fullname`s; `verify:local` includes **EditMode** step; `validate:all` unchanged.
