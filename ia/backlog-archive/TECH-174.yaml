  `PlayOneShot(AudioClip clip, float pitch, float gain, AudioMixerGroup group)` ‚Äî `var source = _pool[_cursor]; _cursor = (_cursor + 1) % _pool.Length;` advances cursor before `Play()` so next caller lands on next voice even if current `Play()` throws. Stops prior clip if still playing (voice-steal hard overwrite ‚Äî no crossfade, post-MVP per orchestration guardrails ¬ß390; MVP 10 sounds + 16-voice pool makes steal rare). Sets `source.clip`, `source.pitch`, `source.volume`, `source.outputAudioMixerGroup` then `source.Play()`. Decision Log ‚Äî voice-steal = hard overwrite (Stop + reassign, no crossfade); cursor advances before Play (wrap math off playback path); per-call mixer group assignment (BlipMixerRouter.Get resolves upstream in BlipEngine.Play, voice stays group-agnostic).
acceptance: |
