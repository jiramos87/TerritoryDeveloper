notes: |
  Restructure `/ship-stage` chain — split into Pass 1 (per-Task implement + `unity:compile-check`
  fast-fail gate) and Pass 2 (Stage-end bulk: verify-loop full Path A+B on cumulative delta →
  code-review on Stage diff → audit → closeout). Moves N× verify-loop + N× code-review to 1× per
  Stage.

  Token economy: Opus code-review N→1 per Stage (~45% token reduction via shared spec/invariant/
  glossary context amortization). Sonnet verify-loop N→1 (~60% reduction via eliminated
  redundant Bash output). Execution time: Unity Path A boot N×30-60s → 1×. Path B preflight
  N×20-40s → 1×. Net ~3.5-8min wall saved per Stage with N=4.

  Cost added: per-Task `unity:compile-check` (~15s × N) kept as fast-fail gate. Cheap.

  Depends on sibling TECH issue "Stage sizing gate — bulk verify/review feasibility heuristic
  in stage-decompose + stage-file-planner" (filed same batch; planner to resolve id via
  backlog_search once sibling yaml materialized). Ship sibling first + observe 2-3 Stages
  empirical data before defaulting this Pass 1/Pass 2 behavior.

  Surfaces: `.claude/agents/ship-stage.md` chain restructure; `ia/skills/ship-stage/SKILL.md`
  Pass 1 + Pass 2 phases; `ia/skills/verify-loop/SKILL.md` Stage-scoped input mode; `ia/skills/
  opus-code-review/SKILL.md` Stage-diff input mode; `ia/rules/agent-lifecycle.md` flow diagram
  update.

  Rollback path: `--per-task-verify` legacy flag preserves current behavior.

  Risks: late break discovery (mitigated per-Task compile gate); cluster fix-tuple anchor
  drift (mitigated — code-fix-applier resolves at apply time); debug bisection harder
  (mitigated — Task atomic commits preserved).

  Out of scope: feasibility heuristics (= sibling TECH issue).

  Findings source: `docs/stage-scoped-verify-review-findings.md` (cross-ref in spec §1 Context).
