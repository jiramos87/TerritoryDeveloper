notes: |
  Stage 2.2 Phase 1 entry. `[Serializable] public struct BlipPatchEntry { public BlipId id; public BlipPatch patch; }` under `Territory.Audio.Blip`. `public sealed class BlipCatalog : MonoBehaviour` w/ `[SerializeField] private BlipPatchEntry[] entries = System.Array.Empty<BlipPatchEntry>()`. `Awake` iterates entries, validates non-null `patch`, validates unique `id` via `_indexById.TryAdd`, calls `BlipPatchFlat.FromSO(entry.patch)` into parallel `_flat[i]`. `_indexById` pre-sized `entries.Length`. Null / duplicate → `InvalidOperationException` w/ index + id diagnostic. Invariant #4 — scene MonoBehaviour, no singleton. Decision Log — use existing `BlipPatchFlat.FromSO(BlipPatch)` static factory (not hypothetical `BlipPatch.ToFlat()` from backlog note); mixer index left `-1` (TECH-171 router overrides); empty entries array legal (no-op flatten); no ready flag here (deferred to TECH-170); `sealed` class (no subclass extension point).
acceptance: |
  both files present + compile; `_flat.Length == entries.Length`; `_indexById` maps each id → flat slot; duplicate / null throws at `Awake`; `unity:compile-check` + `validate:all` green.
