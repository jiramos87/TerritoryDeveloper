notes: |
  All 10 audit fixes landed across 6 phases. **Crashers:** EmploymentManager div/0 already guarded (`if totalRatio > 0`); `CityCell` ctor `Enum.Parse` → `TryParse` w/ fallback. **Data corruption:** AutoZoningManager placement-first ordering (`PlaceZoneAt` then `TrySpend`); `CellData.ValidateData()` height floor `Mathf.Max(1,…)` → `Mathf.Max(0,…)`. **Sim logic:** `GrowthBudgetManager.ReturnAvailable` returns `minAvailablePerCategory` (not `Mathf.Min`); `AutoRoadBuilder` adds `InvalidateRoadCache()` + edges/roadSet re-fetch post street-project loop (satisfies invariant #2); `DemandManager` subtracts building counts from zone counts w/ `Mathf.Max(0,…)`. **Terrain / balance:** water height `<= 0` → `< 0` strict in `RoadStrokeTerrainRules` + `GridPathfinder`; `unemploymentResidentialPenalty` 1.5 → 1.2 (symmetric w/ jobBoost). **Memory leaks:** `OnDestroy()` listener cleanup in `SimulateGrowthToggle`, `GrowthBudgetSlidersController`, `CityStatsUIController`. Kickoff caught Fix 7 spec-vs-code path drift (`Cell.cs` → `CityCell.cs`) — lesson archived.
