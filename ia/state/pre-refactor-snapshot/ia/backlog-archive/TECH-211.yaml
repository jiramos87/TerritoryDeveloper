notes: |
  assigned `mixerGroup` ref on all 10 **Blip patch** SOs per exploration §14 routing (UI pair → `Blip-UI`; Tool + World pair → `Blip-World`; Eco pair → `Blip-Eco`; Sys → `Blip-Sys`). Populated `BlipCatalog.entries[]` MonoBehaviour on `BlipBootstrap.prefab` catalog child — 10 `BlipPatchEntry` rows (`BlipId` + `BlipPatch` SO ref), no null refs, no duplicate ids. Confirmed `catalogSlot` + `playerSlot` `Transform` fields on root `BlipBootstrap` point to child GOs hosting `BlipCatalog` + `BlipPlayer` MonoBehaviours. Decision Log — catalog is MonoBehaviour on prefab child (not standalone SO) so wiring lives on prefab; patch SO canonical path `Assets/Audio/Blip/Patches/` (not `Assets/Audio/BlipPatches/`); slot typing is `Transform` so acceptance requires both Transform assignment + component presence on child GO.
acceptance: |
  10 SOs carry non-null `mixerGroup`; `entries[]` size == 10 w/ no null refs; prefab slots populated; `npm run unity:compile-check` green.
