id: TECH-189
type: infrastructure / audio runtime
title: Bind/Unbind + cached lazy resolution (Stage 2.3 Phase 1) (2026-04-15)
priority: medium
status: closed
section: ""
spec: (removed at closeout — journal skipped empty sections; Decision Log captured in Notes)
files: 
  - Assets/Scripts/Audio/Blip/BlipEngine.cs
notes: |
  `BlipEngine` adds `static BlipCatalog _catalog; static BlipPlayer _player;`. `Bind(BlipCatalog c)` / `Bind(BlipPlayer p)` setters (null-safe overwrite via `if (c != null) _catalog = c;`). `Unbind(BlipCatalog)` / `Unbind(BlipPlayer)` identity-guarded nullers (`if (ReferenceEquals(_catalog, c)) _catalog = null;`) — prevents late `OnDestroy` from stale instance wiping freshly-bound reload. `internal static ResolveCatalog()` / `ResolvePlayer()` — return cached field when non-null, else `FindObjectOfType<T>()` + cache. Invariant #3 — one-shot bootstrap lookup, not per-frame. Invariant #4 — no new singleton; state lives on MonoBehaviour hosts. Decision Log — Unbind guarded by `ReferenceEquals` (additive-scene reload safety); `Bind(null)` = no-op not clear (callers use `Unbind` explicitly; off-path callers never explode); lazy `FindObjectOfType` allowed in `Resolve*` (one-time cached, not per-frame).
acceptance: |
  Bind/Unbind overloads land + null-safe; `Resolve*` caches reference on first call; repeated calls do not re-enter `FindObjectOfType`; `npm run unity:compile-check` green.
depends_on: 
  - TECH-188
depends_on_raw: "**TECH-188** (archived)"
related: []
