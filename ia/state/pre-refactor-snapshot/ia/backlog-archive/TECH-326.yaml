notes: |
  Shipped `reserve_backlog_ids` MCP tool (IP3). Handler `tools/mcp-ia-server/src/tools/reserve-backlog-ids.ts` spawns `tools/scripts/reserve-id.sh {prefix} {count}` via `node:child_process` w/ `cwd: REPO_ROOT`; parses stdout → `{ ids: string[] }`; non-zero exit or parse mismatch → structured `RESERVE_FAILED` w/ captured stderr. Input via zod (prefix enum + count 1..50). `buildScriptEnv()` patches PATH to include Homebrew util-linux Cellar so `flock` resolves in npm test shell on macOS. Registered alongside `registerBacklogRecordValidate` in MCP index. Preserves invariant #13 (script-backed counter mutation). Unblocks `stage-file` / `project-new` MCP migration.
acceptance: |
