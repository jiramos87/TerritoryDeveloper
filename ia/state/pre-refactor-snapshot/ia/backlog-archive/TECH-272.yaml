notes: |
  Replace Stage 5.1 Comb-case passthrough stub w/ feedback comb `int D = (int)(p0 / 1000f * sampleRate); float delayed = delayBuf[(writePos - D + bufLen) % bufLen]; float y = x + p1 * delayed; delayBuf[writePos] = x; writePos = (writePos + 1) % bufLen; x = y`. Guard `D >= 1 && D < bufLen` else break (passthrough). `BlipPatch.OnValidate` clamps `p1` (feedback gain) to `[0f, 0.97f]` for Comb FX slots — BIBO stability margin. New EditMode test `BlipFxChainTests.Comb_FeedbackAttenuation`: impulse, 10 ms delay, g=0.5 → second-echo amplitude ≈ 0.5 ± 0.05 relative to first echo. Zero managed alloc; no Unity API.
acceptance: |
  Comb kernel present per §5.2; `p1` clamp in `OnValidate`; impulse-response test green (0.5 ± 0.05); `npm run unity:compile-check` + `npm run validate:all` exit 0.
