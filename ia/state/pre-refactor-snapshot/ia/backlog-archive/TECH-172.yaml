notes: |
  `public sealed class BlipCooldownRegistry` plain class. `Dictionary<BlipId, double> _lastPlayDspTime`. `TryConsume(BlipId id, double nowDspTime, double cooldownMs) → bool` — if unseen OR `(nowDsp - last) * 1000 >= cooldownMs` → record + return `true`; else `false`. Instantiated in `BlipCatalog.Awake` between `_mixerRouter` alloc and `BlipEngine.Bind`; held as `_cooldownRegistry` instance field (invariant #4 — no singleton). Clock-agnostic — caller passes `nowDspTime` (pure-C# testable). Window anchored on first accepted timestamp (blocked attempts do NOT slide window — starvation-safe under rapid spam). No autosave wiring (MVP). Consumer wiring (`BlipEngine.Play` cooldown query + `internal` catalog accessor) deferred to Stage 2.3 T2.3.3. Decision Log — registry clock-agnostic (pure-C# testable w/o PlayMode harness); no `internal` catalog accessor in this spec (T2.3.3 adds when consumer lands — avoid dangling dead code); window anchors on first accepted timestamp (master-plan T2.2.4 pseudocode match); glossary row `Blip cooldown` deferred to Step 2 close (blip-master-plan §Glossary rows — Step 2 Blip-* terms batch-land on Step close).
acceptance: |
  first call returns `true`; second within window returns `false`; after-window returns `true` + updates timestamp; catalog holds instance; `unity:compile-check` green.
depends_on: 
  - TECH-169
