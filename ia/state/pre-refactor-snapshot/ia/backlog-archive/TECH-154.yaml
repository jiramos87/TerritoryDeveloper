notes: |
  Stage 1.3 Phase 1 closer. `palette extract {class} --sources "glob_pattern"` subcommand in existing argparse `cli.py`. Expand glob to `list[Path]`, call `extract_palette` (TECH-153, archived), print each cluster's swatch using ANSI 24-bit true-color block, prompt `stdin` for material name per cluster, write named result to `tools/sprite-gen/palettes/{class}.json`. JSON schema: `{"class": str, "materials": {name: {bright, mid, dark}}}` — `centroid` dropped (consumer needs ramp only). Non-TTY fallback: `--names "a,b,c,..."` comma list. Decision Log — drop `centroid` from persisted JSON (exploration §6 ramp-only contract); out dir under `_TOOL_ROOT/palettes/` (matches `_SPECS_DIR`/`_OUT_DIR` convention); hard error on name/cluster count mismatch (fail fast over silent truncate); non-TTY without `--names` → exit 1 (prevents CI hang on closed stdin).
acceptance: |
  interactive run writes valid `palettes/{class}.json`; non-TTY `--names` path works without stdin; `cli.py palette extract residential --sources "Assets/Sprites/Residential/house1-64.png" --names "wall_brick_red,roof_tile_brown,window_glass,concrete,trim,shadow,highlight,mortar"` produces 8-material JSON; `npm run validate:all` green.
