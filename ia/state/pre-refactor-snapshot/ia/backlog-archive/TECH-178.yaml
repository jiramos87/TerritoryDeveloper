notes: |
  N-slope spec fixture clones `building_residential_small.yaml` w/ `terrain: N`, `output.name: building_residential_small_N`, `variants: 1`. Pytest `test_slope_regression.py` — `test_n_slope_canvas_grows` invokes `cli.main(["render","building_residential_small_N"])` via monkeypatched `_OUT_DIR=tmp_path`, asserts `img.height > 64` + `canvas.pivot_uv(img.height) != (0.5, 0.25)`. `test_all_17_slope_ids_render` parametrizes over `cli._VALID_SLOPE_IDS - {"flat"}` via `--terrain` override on flat source spec, asserts `rc==0` + PNG exists. `test_flat_sentinel_byte_stable` pins TECH-177 no-op branch (`h==64`, `pivot_uv==(0.5,0.25)`). Decision Log — slope id source = `cli._VALID_SLOPE_IDS - {"flat"}` (single source of truth, matches glossary **Slope variant naming**); parametrize via `--terrain` override (production code path, not 17 YAML fixtures); dedicated N-slope YAML kept (exercises non-override `spec['terrain']` read); flat sentinel test added beyond original spec (pins TECH-177 byte-stable contract); no golden PNG snapshots (shape-level only per §2.2).
acceptance: |
  17 slope renders pass; N-slope canvas grown + pivot adjusted; `pytest tools/sprite-gen/tests/test_slope_regression.py` green; `npm run validate:all` green.
