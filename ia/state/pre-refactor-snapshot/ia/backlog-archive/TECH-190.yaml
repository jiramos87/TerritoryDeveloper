type: infrastructure / audio runtime
title: "`BlipEngine.Play` dispatch body (Stage 2.3 Phase 2) (2026-04-15)"
priority: medium
status: closed
section: ""
spec: (removed at closeout — journal skipped empty sections; Decision Log captured in Notes)
files: 
  - Assets/Scripts/Audio/Blip/BlipEngine.cs
  - Assets/Scripts/Audio/Blip/BlipCatalog.cs
notes: |
  `BlipEngine.Play(BlipId, float pitchMult, float gainMult)` chain — `AssertMainThread()` → `ResolveCatalog()` null/not-ready → silent return; `ResolvePlayer()` null → silent return; `cat.Resolve(id)` → `ref readonly BlipPatchFlat`; `cat.CooldownRegistry.TryConsume(id, AudioSettings.dspTime, patch.cooldownMs)` block → silent return **before** bake; `variantIndex = patch.deterministic ? 0 : cat.NextVariant(id, patch.variantCount)`; `cat.Baker.BakeOrGet(in patch, cat.PatchHash(id), variantIndex)` → clip; `cat.MixerRouter.Get(id)` → group; `player.PlayOneShot(clip, pitchMult, gainMult, group)`. `BlipCatalog` adds `_baker` field + `_patchHashes` parallel int array + `_rngState` xorshift32 dict + `internal` accessors `Baker` / `MixerRouter` / `CooldownRegistry` / `PatchHash(BlipId)` / `NextVariant(BlipId, int)`. Decision Log — `PatchHash` on catalog not flat (SO owns hash; `BlipPatchFlat` intentionally omits); Baker instantiation lands here (Stage 2.2 omitted); xorshift32 over `System.Random` (allocation-free, deterministic, Knuth-hash seed forced odd); player-null silent return mirrors non-ready catalog (boot race safety).
acceptance: |
  play path lands clip on player pool when catalog ready; cooldown-blocked id returns silently without baking; non-ready catalog returns silently; deterministic patch always picks variant 0; `npm run unity:compile-check` green.
depends_on: 
  - TECH-189
depends_on_raw: "**TECH-189** (archived)"
related: []
