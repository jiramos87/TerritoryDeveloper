notes: |
  Blip master-plan Stage 1.3 Phase 1 opener (task T1.3.1). `BlipVoiceState` blittable struct in `Territory.Audio` — 9 fields: `phaseA..phaseD` (double phase accumulators, 3 osc slots + LFO reserve), `envLevel` (float 0..1), `envStage` (`BlipEnvStage` reused from TECH-112 / `BlipPatchTypes.cs` — do NOT redeclare), `samplesElapsed` (int since stage entry), `filterZ1` (float one-pole LP memory), `rngState` (uint xorshift32 seed). Public fields, no ctor / properties — kernel mutates via `ref`. Zero managed refs. Default zero-init = Idle / silent. 4th phase slot (phaseD) reserved for LFO / post-MVP modulation (8 bytes padding; avoids struct churn when LFO lands). Caller-owned — lives outside static kernel; feeds TECH-117 (osc bank, writes phaseA..C + rngState) + TECH-118 (AHDSR, writes envStage + samplesElapsed) + TECH-119 (env level, writes envLevel) + TECH-120 (LP, writes filterZ1) + TECH-121 (render driver) + TECH-122 (jitter RNG). Orchestrator: [`projects/blip-master-plan.md`](../ia/projects/blip-master-plan.md) Stage 1.3.
acceptance: |
  struct + `BlipEnvStage` enum compile; zero managed refs; `unity:compile-check` + `validate:all` green
