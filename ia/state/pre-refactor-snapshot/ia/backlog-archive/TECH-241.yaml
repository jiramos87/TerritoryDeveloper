notes: |
  Wired `PlanChart` into `web/app/dashboard/page.tsx` via `next/dynamic` + `ssr: false`. Next.js 16 App Router RSC forbids `ssr: false` in RSC scope — extracted dynamic call to new `'use client'` wrapper `web/components/PlanChartClient.tsx` and imported wrapper from RSC (canonical pattern per `node_modules/next/dist/docs/01-app/02-guides/lazy-loading.md`). Loading skeleton `<div className="h-[220px] bg-bg-panel animate-pulse rounded" />` — real `@theme` aliases. Status buckets set-based (Option B locked at kickoff, mirrors TECH-233): `PENDING_STATUSES = {'_pending_', 'Draft'}`, `IN_PROGRESS_STATUSES = {'In Progress', 'In Review'}`, reuse existing `DONE_STATUSES = {'Done (archived)', 'Done'}` — covers full `TaskStatus` union. Per-plan aggregate via `plan.allTasks.filter(t => t.id.startsWith('T' + step.id + '.'))`; one `<PlanChart>` per plan below its `<DataTable>`. `plan-loader.ts` + `plan-loader-types.ts` + `parse.mjs` byte-identical. MEMORY tip added for RSC `ssr: false` wrapper pattern.
acceptance: |
  `dynamic(() => import('@/components/PlanChart'), { ssr: false, loading })` wired (via `PlanChartClient.tsx` wrapper); skeleton uses real token classes; per-plan chart renders below `DataTable`; plan-loader byte-identical; `npm run validate:all` green.
depends_on: 
  - TECH-239
  - TECH-240
