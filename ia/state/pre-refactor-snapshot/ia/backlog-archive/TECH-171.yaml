notes: |
  `public sealed class BlipMixerRouter` plain class. Ctor takes `BlipPatchEntry[] entries`, builds `Dictionary<BlipId, AudioMixerGroup> _map` reading authoring-only `entry.patch.mixerGroup` ref (NOT in `BlipPatchFlat` — Stage 1.2 T1.2.4 Decision Log). `Get(BlipId) → AudioMixerGroup` (throws on unknown id via `ArgumentOutOfRangeException`). Duplicate-id throws `InvalidOperationException` (defense-in-depth; upstream `BlipCatalog` also traps). Instantiated in `BlipCatalog.Awake` + held as instance field `_mixerRouter` before `BlipEngine.Bind(this)` + ready flag. Invariant #4 — plain class, no singleton. Decision Log — router accepts null `patch.mixerGroup` silently (Stage 2.3 consumer falls back to mixer master); router mirrors `BlipCatalog` duplicate-id throw contract for symmetric API surface.
acceptance: |
  router constructs w/o throw on valid entries; `Get` round-trips authored mixer group ref; catalog holds instance; `unity:compile-check` green.
depends_on: 
  - TECH-169
