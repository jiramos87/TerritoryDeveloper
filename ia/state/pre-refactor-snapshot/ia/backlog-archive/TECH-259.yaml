notes: |
  New `internal static class BlipFxChain` with `static void ProcessFx(ref float x, BlipFxKind kind, float p0, float p1, ref float dcZ1, ref float dcY1, ref float ringPhase, int sampleRate)`. Cores: BitCrush `x = Mathf.Round(x*steps)/steps, steps = 1<<(int)p0`; RingMod `ringPhase += 2π*p0/sampleRate; x *= Mathf.Sin(ringPhase)` w/ guard `sampleRate > 0` + wrap `if (ringPhase > TwoPi) ringPhase -= TwoPi`; SoftClip `x = x/(1f + Mathf.Abs(x))`; DcBlocker `float y = x - dcZ1 + 0.9995f*dcY1; dcZ1 = x; dcY1 = y; x = y`. Comb/Allpass/Chorus/Flanger cases → passthrough stubs (kernels land Stage 5.2). Zero allocs; only `Mathf.Round`/`Mathf.Sin`/`Mathf.Abs`/`Mathf.PI` Unity API. Decision Log: BitCrush clamp at caller not core (hot-path branch); single `if`-subtract phase wrap (no `fmod`); `0.9995f` pole pinned (not param); `Mathf.Sin` direct (LUT → Stage 5.3); `None` + delay-line kinds share `default` arm. Closes Stage 5.1 T5.1.4 Exit bullet "BitCrush/RingMod/SoftClip/DcBlocker implemented; Comb/Allpass/Chorus/Flanger return passthrough". Consumer is TECH-260 (`BlipVoice.Render` unrolled 4-slot dispatch).
acceptance: |
  `BlipFxChain.cs` present; 4 memoryless cores implemented; delay-line kinds return input unchanged; zero managed allocs (verified via NoAlloc test in TECH-260); `npm run unity:compile-check` green; `npm run validate:all` exit 0.
