notes: |
  Stage 1.2 Phase 1 opener. `compose_sprite(spec: dict) → PIL.Image` — canvas via `canvas_size(fx, fy, extra_h)` clamped min 64 px; iterates `composition:` list; dispatch dict `{'iso_cube','iso_prism'}` resolves `type:` key; `UnknownPrimitiveError` on unknown; `extra_h = max(h + offset_z)` over entries; origin = footprint SE corner (y-down) matching TECH-125/126 `_project` convention; material stays stub RGB until Stage 1.3 palette. Wires **TECH-125** / **TECH-126** into Layer 2 of the 5-layer composer per exploration §3. Decision Log — dispatch dict (extensible for Stage 1.4 foundation); `max(h+offset_z)` not sum (stacks); composer owns min-canvas-h clamp; SE-corner origin; stub material dict. Four pytest contracts in `test_compose.py` (canvas size, composition order, unknown primitive, min canvas clamp).
acceptance: |
  `compose_sprite(sample_spec)` returns PIL.Image w/ canvas size matching `canvas_size(fx, fy, extra_h)`; primitives stacked in order; `npm run validate:all` green.
