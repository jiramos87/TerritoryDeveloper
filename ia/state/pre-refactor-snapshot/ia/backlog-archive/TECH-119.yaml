notes: |
  **Completed (verified — `/project-spec-close`).** Pure static `ComputeLevel(in BlipEnvelopeFlat, BlipEnvStage, int samplesElapsed, int stageDurationSamples, float releaseStartLevel) → float` on `BlipEnvelopeStepper`. Stage × shape routing: Idle/Hold/Sustain flat constants (0f / 1f / `sustainLevel`); Attack/Decay/Release drive Linear or Exponential per `BlipEnvelopeFlat.{attack,decay,release}Shape`. Linear — `t = samplesElapsed / stageDurationSamples` clamped, `start + (target − start) * t`. Exponential — `τ = stageDurationSamples / 4f`, `target + (start − target) * (float)Math.Exp(−samplesElapsed / τ)` (≈98 % settled at 4 τ). Edge — `stageDurationSamples <= 0` → return `target`. Zero allocs, no Unity API. Exponential ≈98 % settled slope + flat-constant assertions deferred to Stage 1.4 T1.4.3.
