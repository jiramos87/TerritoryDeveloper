id: TECH-135
type: infrastructure / DSP math
title: "`BlipVoice.Render` driver + per-invocation jitter (consolidated) (2026-04-14)"
priority: closed
status: closed
section: Completed (moved from BACKLOG.md, 2026-04-13)
spec: (removed after closure)
files: 
  - Assets/Scripts/Audio/Blip/BlipVoice.cs
  - Assets/Scripts/Audio/Blip/BlipVoiceState.cs
  - Assets/Scripts/Audio/Blip/BlipPatchFlat.cs
notes: |
  Stage 1.3 Phase 3 closeout. Consolidates former TECH-121 (render driver loop) + TECH-122 (per-invocation jitter) per stage compress. Lands `BlipVoice.Render` static kernel — per-sample loop (osc × envelope × LP filter → buffer mix-in) + pre-computed per-invocation jitter block (pitch cents → `pow(2, cents/1200)`, gain dB → `pow(10, dB/20)`, pan stashed on state). Honors `deterministic` flag → bypass jitter + fixed seed `(uint)(variantIndex + 1)`. Live path seed mix `(uint)(variantIndex * 0x9E3779B9) ^ state.rngState` w/ `0x9E3779B9` zero-guard (xorshift32 undefined at 0). **Decisions:** extended `BlipVoiceState` w/ `public float panOffset` (caller-scratch rejected — single-source-of-truth DSP state); caller-seeded `state.rngState` as voice-hash input (`patch.patchHash` deferred); pitch-fold Option B — added `BlipOscillatorFlat(in BlipOscillatorFlat src, float detuneCents)` copy constructor so TECH-117 `SampleOsc` signature stays frozen (churn confined to driver); `SampleJitter` helper short-circuits `range == 0f`. Zero managed allocs (all locals stack value types); no Unity API. Shared kernel — `BlipBaker` Step 2 + `BlipLiveHost` post-MVP. Determinism + zero-alloc assertions deferred to Stage 1.4 T1.4.6 / T1.4.7 EditMode tests.
acceptance: |
  signature matches Stage 1.3 Exit; per-sample loop mixes osc × envelope × filter; jitter applied per invocation; no Unity API; `unity:compile-check` + `validate:all` green (141/141).
depends_on: 
  - TECH-116
  - TECH-117
  - TECH-118
  - TECH-119
  - TECH-120
