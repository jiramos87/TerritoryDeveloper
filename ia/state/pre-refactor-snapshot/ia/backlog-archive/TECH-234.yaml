notes: |
  Extended `web/app/dashboard/page.tsx` `plan.steps.map((step) => ...)` block — derived `stepTasks = plan.allTasks.filter(t => t.id.startsWith(\`T${step.id}.\`))`, `stepDone = stepTasks.filter(t => DONE_STATUSES.has(t.status)).length`, `stepTotal = stepTasks.length` reusing top-of-file `DONE_STATUSES = new Set(['Done (archived)', 'Done'])` constant (no duplication — drift risk). Rendered `<StatBar label={\`${stepDone} / ${stepTotal} done\`} value={stepDone} max={stepTotal} />` in step heading flex row next to `<BadgeChip>`; guarded `stepTotal === 0` → skip render (no `0/0` placeholder — keeps heading clean, mirrors `filterPlans` empty-prune pattern). Task→step filter stays consumer-side — `plan-loader.ts` + `parse.mjs` byte-identical. Appended `web/README.md §Components` `DataTable` subsection documenting `pctColumn?: { dataKey; label?; max? }` contract + minimal snippet; confirmed existing `Button` subsection matches shipped `web/components/Button.tsx` API (variant / size / href / disabled). Closes Stage 4.2 Exit bullets (Button shipped, DataTable `pctColumn` shipped, per-plan + per-step StatBar rendering, README entries present).
acceptance: |
  Per-step `StatBar` row visible below each step heading on `/dashboard`; `web/README.md §Components` has Button + DataTable `pctColumn` entries; `npm run validate:all` green; Stage 4.2 Exit bullets all satisfied.
