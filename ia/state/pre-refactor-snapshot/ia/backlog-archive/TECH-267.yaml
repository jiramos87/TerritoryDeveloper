notes: |
  Update `disallow` array in `web/app/robots.ts` — drop `/dashboard` (auth middleware from TECH-265 now gates access; SEO crawlers hitting `/dashboard` unauthenticated get 302 → `/auth/login` which is itself disallowed); add `/auth` (covers `/auth/login` + future `/auth/register`). Final disallow: `['/design', '/auth']`. Sitemap audit: `web/app/sitemap.ts` emits only MDX pages + devlog — `/auth/login` + `/dashboard` absent (neither enumerated). No sitemap edit. Decision Log: drop `/dashboard` (middleware provides structural 302 gate; robots duplicate signal); prefix `/auth` not `/auth/login` (post-Step-5 portal `/auth/register` inherits w/o robots churn); no `X-Robots-Tag` header (robots.txt sufficient at stub tier).
acceptance: |
  `web/app/robots.ts` disallow array = `['/design', '/auth']`; `/auth/login` + `/dashboard` absent from `web/app/sitemap.ts` output (audit only); `cd web && npm run typecheck` green; `cd web && npm run build` green; `npm run validate:all` exit 0.
