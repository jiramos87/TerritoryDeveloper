notes: |
  Stage 1.1 Phase 1 of Blip audio program. `BlipBootstrap.Awake` reads `PlayerPrefs.GetFloat("BlipSfxVolumeDb", 0f)` + calls `BlipMixer.SetFloat("SfxVolume", db)` with null-guard + branch logs (success + missing-mixer warn + SetFloat-failure warn). Key + param + default exposed as `public const string` / `public const float` on `BlipBootstrap` (`SfxVolumeDbKey`, `SfxVolumeParam`, `SfxVolumeDbDefault = 0f`) so post-MVP Settings UI binds same keys w/o duplication. No Settings UI in MVP (visible slider + mute toggle deferred per `docs/blip-post-mvp-extensions.md` §4). Merged w/ TECH-100 `Awake` body — TECH-99 owns binding block + constants, TECH-100 owns `DontDestroyOnLoad` + slots. Orchestrator: [`projects/blip-master-plan.md`](../ia/projects/blip-master-plan.md) Stage 1.1 Phase 1.
acceptance: |
  `BlipBootstrap.cs` committed w/ binding; `unity:compile-check` + `validate:all` green
