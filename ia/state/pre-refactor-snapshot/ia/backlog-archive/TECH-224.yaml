notes: |
  **Completed (verified — `/project-spec-close`).** `web/components/Sidebar.tsx` flipped to `'use client'`. `usePathname()` drives per-link `active = pathname === href` → `text-accent-warn bg-panel rounded` (token corrected at kickoff — palette has only `text-accent-warn` amber + `text-accent-critical` red, no plain `text-accent`; warn-amber chosen so red stays destructive-only semantics). Mobile overlay: `useState(false)` `open` bool + lucide `Menu` / `X` toggle button (`md:hidden fixed top-4 left-4 z-50`); `<nav>` keeps `fixed inset-y-0 left-0 w-48 z-40 transform transition-transform md:static md:translate-x-0` and toggles `translate-x-0` / `-translate-x-full` on `open` (DOM-resident for slide anim, NOT `hidden`). Each `<Link>` calls `setOpen(false)` → overlay auto-dismisses on mobile nav. Phase 0 preflight confirmed `usePathname` + lucide `Menu` / `X` resolve under `next@16.2.3` + `lucide-react@^1.8.0`. Stack reality: workspace runs Tailwind v4 CSS-first config in `web/app/globals.css` `@theme` (no `tailwind.config.ts`); `--color-text-accent-warn` already declared. Validate: `cd web && npm run lint && npm run typecheck && npm run build` green; `npm run validate:all` green. Decision Log — `fixed inset-y-0` + `md:static` single-component pattern over CSS `@media` + dual components; auto-close overlay on link tap (UX convention); amber over critical-red for active highlight (semantics); `-translate-x-full` over `hidden` (preserve slide). Issues Found — Next 16 `usePathname()` returns non-nullable `string` (Next 13/14 was `string | null`); no null-guard needed (lesson migrated to MEMORY.md). Phase 1 of Stage 4.1; siblings TECH-225 (root layout wiring) + TECH-226 (README §Components) still open.
