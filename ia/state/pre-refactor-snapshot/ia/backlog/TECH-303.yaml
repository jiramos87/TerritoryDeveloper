notes: |
  Define typed pull contract + metric id enum before any MonoBehaviour work. `IStatsReadModel.cs` declares `GetScalar(StatKey) → float`, `GetSeries(StatKey, int windowTicks) → float[]`, `EnumerateRows(string dimension, Predicate<object> filter) → IEnumerable<object>`. `StatKey.cs` enum covers every current `CityStats` public field (population, money, happiness, forestCoverage, unemployment, jobs, demand r/c/i, etc.) + stubs `RegionPopulation` / `CountryPopulation` (filled in Stage 3.1). No runtime wiring, no scene changes. Doc-only new types — consumers wired in later stages. Preserves invariants #3 #4 #6 (no singletons, no FindObjectOfType hot-path, no GridManager bloat). Tier D execution gate — filing now for IA alignment per full-game-mvp Bucket 8.
acceptance: |
  Both files compile; `StatKey` enum entry per current `CityStats` public field + `RegionPopulation` / `CountryPopulation` stubs; `IStatsReadModel` signatures match Stage 1.1 Exit; no runtime references yet; `npm run unity:compile-check` clean; `npm run validate:all` clean.
