notes: |
  `write_meta(png_path, canvas_h)` emits Unity YAML w/ uuid4 guid, PPU=64, `spritePivot=(0.5, 16/canvas_h)`, filterMode=Point, textureCompression=None, spriteMode=Single. `curate.promote(src_png, dest_name)` copies to `Assets/Sprites/Generated/{dest_name}.png` + writes sibling `.meta`. Guards against Unity auto-import resetting PPU/pivot (sprite-gen master plan §Do not).
acceptance: |
  promote lands PNG + valid `.meta` w/ correct PPU/pivot/filter/compression; `pytest tools/sprite-gen/tests/test_unity_meta.py` green; `npm run validate:all` green.
