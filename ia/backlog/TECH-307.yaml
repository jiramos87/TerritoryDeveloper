notes: |
  `SignalFieldRegistry` MonoBehaviour — allocates one `SignalField` per `SimulationSignal` entry in `Awake`; fields sized from `GridManager.gridWidth` + `gridHeight`; `GetField(SimulationSignal)` accessor returns per-signal `SignalField`; `[SerializeField] private GridManager grid` Inspector ref + `FindObjectOfType<GridManager>()` fallback in `Awake` (invariant #4); resize method (`ResizeForMap(int w, int h)`) reallocates all 12 fields when map reloads. No per-frame `FindObjectOfType` (invariant #3 — resolved once in `Awake`). Consumes TECH-305 enum + TECH-306 `SignalField`. Registry injected into Stage 1.2 `SignalTickScheduler` + composers via Inspector refs. Invariant #6 — new MonoBehaviour, not added to `GridManager`.
acceptance: |
  `SignalFieldRegistry.cs` compiles; `Awake` allocates 12 `SignalField` instances sized from `GridManager`; `GetField(SimulationSignal)` returns corresponding field; `[SerializeField] GridManager grid` + `FindObjectOfType` fallback present; no `FindObjectOfType` in `Update` or per-frame loops; `ResizeForMap` reallocates fields; `npm run unity:compile-check` clean; `npm run validate:all` clean.
depends_on: [TECH-305, TECH-306]
