raw_markdown: |
  # TECH-846 — Big-file Read PreToolUse warn hook (Tier A4 compaction mitigation)

  **Issue:** [TECH-846](../../BACKLOG.md)
  **Status:** Draft
  **Created:** 2026-05-08
  **Last updated:** 2026-05-08

  ## Summary

  Add PreToolUse Read interceptor detecting large C# source reads (>800 lines under Assets/**) emitting advisory recommending csharp_class_summary MCP tool first. Non-blocking (exit 0); bypass via BIG_FILE_READ_OK=1 env. Reduces token spend during atomization sweep without blocking legitimate full reads.

  ## Goals

  1. Detect Read tool invocations on Assets/**/*.cs files exceeding 800-line threshold.
  2. Emit caveman-style advisory pointing at csharp_class_summary MCP tool.
  3. Keep hook non-blocking (exit 0) — pure nudge, never gate.
  4. Provide BIG_FILE_READ_OK=1 escape hatch env-var for legitimate full reads.
  5. Reuse JSON-parsing pattern from bash-denylist.sh (jq primary, sed fallback).

  ## Implementation Details

  **Systems map:**
  - `tools/scripts/claude-hooks/` — new big-file-read-warn.sh script
  - `.claude/settings.json` — PreToolUse hook wiring (matcher: Read)
  - `docs/audit/compaction-loop-mitigation.md` — Tier A4 reference seed

  **Phase 1:** Author tools/scripts/claude-hooks/big-file-read-warn.sh — read stdin JSON, extract tool_input.file_path, glob-match Assets/**/*.cs, line-count via wc -l, emit advisory if >800 lines and BIG_FILE_READ_OK unset, always exit 0.

  **Phase 2:** Wire into .claude/settings.json hooks.PreToolUse with matcher 'Read'.

  **Phase 3:** Smoke test — Read on Assets/Scripts/Managers/GameManagers/TerrainManager.cs (4273 lines) → advisory fires; Read on small file → silent; BIG_FILE_READ_OK=1 + big file → silent.

  **Phase 4:** Optional unit fixture mirroring bash-denylist.test.sh pattern.

  ## Open Questions

  - Confirm 800-line threshold vs alternative (e.g., 500 / 1000) — seed doc says 800.
  - Should advisory cite specific csharp_class_summary invocation example, or just tool name?
  - Test fixture parity with bash-denylist.test.sh — required at file time or follow-up TECH?
