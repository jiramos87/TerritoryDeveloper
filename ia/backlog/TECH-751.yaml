id: TECH-751
type: TECH
title: HTTP error contract
priority: medium
status: open
section: grid-asset-visual-registry
spec: ia/projects/TECH-751.md
files: []
notes: |
  Map DB / validation errors to 400 / 404 / 409 with structured JSON body `{error, code, detail?}` consistent
  with other `web/app/api/*` routes. Log server-side stack; never return stack to client. Shared helper under
  `web/lib/api/errors.ts` (or project-standard location). Used by read routes (TECH-749/750) + write routes
  (TECH-752/753/754).
acceptance: |
  - One helper invoked from every catalog route.
  - Codes + JSON shape match existing `web/app/api/*` conventions.
  - No raw error bodies or stack traces leaked to client.
depends_on: []
depends_on_raw: No upstream blocking; foundational for all catalog routes.
