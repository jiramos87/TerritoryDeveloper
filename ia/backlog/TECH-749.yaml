notes: |
  `GET /api/catalog/assets` under `web/app/api/catalog/assets/route.ts`. Default filter `status=published`;
  optional `?includeDraft=1` (or admin header) for draft visibility. Consume `web/types/api/catalog*.ts`
  DTOs (TECH-626, TECH-628). No Drizzle. Pagination params (`limit`/`cursor` or `offset`) if row count grows;
  document chosen pagination in spec §7. Stage 1.3 Phase 1.
acceptance: |
  - Route returns `published` rows by default; `draft` opt-in only.
  - Response shape matches `CatalogAssetListResponse` DTO (TECH-628).
  - Pagination contract documented (even if MVP returns full list).
  - `npm run validate:web` green; `npm run validate:all` green.
