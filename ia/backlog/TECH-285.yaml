notes: |
  `BlipLfoKind` enum (Off=0 / Sine=1 / Triangle=2 / Square=3 / SampleAndHold=4) + `BlipLfoRoute` enum (Pitch=0 / Gain=1 / FilterCutoff=2 / Pan=3) + `BlipLfo [Serializable] struct` (BlipLfoKind kind; float rateHz, depth; BlipLfoRoute route) + `BlipLfoFlat readonly struct` — all in `BlipPatchTypes.cs`. `BlipPatch` gains `[SerializeField] public BlipLfo lfo0, lfo1`; `OnValidate` clamps `rateHz ≥ 0`. `BlipPatchFlat` gains `BlipLfoFlat lfo0Flat, lfo1Flat`; ctor copies both. Pure data-model scaffold — no kernel logic (advance TECH-287, routing TECH-288).
acceptance: |
  enums + structs present; `BlipPatch.lfo0/lfo1` serialized + clamp; `BlipPatchFlat` blittable w/ new fields; `npm run unity:compile-check` green; `npm run validate:all` exit 0; existing `BlipGoldenFixtureTests` + `BlipNoAllocTests` still green.
