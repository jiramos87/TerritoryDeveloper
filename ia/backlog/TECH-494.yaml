title: "Token-cost telemetry baseline — pre/post lifecycle refactor + Q9 pair-head read-count"
priority: low
status: open
section: "Tooling / Telemetry"
spec: "ia/projects/TECH-494.md"
files: []
notes: |
  Stage 10 precondition tracker. Capture per-Stage baseline to validate prompt-cache savings + F2 bundle sizing gate before Stage 10 T10.1 opens. Scope MUST include:
  (a) total prompt tokens per Stage (sum across every agent dispatch in that Stage lifecycle);
  (b) pair-head read count per Stage — distinct per-file reads issued by Opus planners (each cache-hit read counted separately; precondition for Stage 10 P1 savings validation per `docs/prompt-caching-mechanics.md` §4 R5; Stage 10 gate requires ≥3 reads/Stage sampled across ≥3 post-merge Stages);
  (c) cache-write / cache-read / cache-miss token counts from Anthropic `usage.cache_creation_input_tokens` + `usage.cache_read_input_tokens` response fields;
  (d) per-Stage bundle byte + token size (validates F2 sizing gate per lifecycle rev 4 C1/R2).
  Data feeds Stage 10 T10.1 precondition gate. Cross-referenced from lifecycle-refactor-master-plan.md Stage 10 precondition note.
acceptance: |
  - [ ] Telemetry collector captures (a)–(d) per Stage across ≥3 post-merge Stages.
  - [ ] Baseline report dumped to `ia/state/token-telemetry/{stage-id}.json`.
  - [ ] Stage 10 T10.1 precondition gate evaluator reads collector output + emits GO / REJECTED verdict.
  - [ ] Collector handles sparse `usage` fields gracefully (absent cache fields → 0, not crash).
