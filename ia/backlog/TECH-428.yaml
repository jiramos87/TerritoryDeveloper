notes: |
  Refactor `spec-sections.ts` to return `{ results: {[spec_key]: {sections: [...]}}, errors: {[spec_key]: {code, message}}, meta: {partial: {succeeded, failed}} }`. One bad input key → populate `errors[key]`, rest still succeed. Envelope `ok: true` when ≥1 succeeds; all-fail → `ok: false, error.code: "invalid_input"`. `meta.partial` propagates through `EnvelopeMeta`. Stage 2.3 Phase 2 T2.3.3 of `ia/projects/mcp-lifecycle-tools-opus-4-7-audit-master-plan.md`.
acceptance: |
  Bulk input w/ mixed good + bad keys → `ok: true`, `payload.results` for found, `payload.errors` for bad, `meta.partial: {succeeded, failed}` populated. All-good → `errors: {}`. All-bad → `ok: false, error.code: "invalid_input"`. Unit tests cover all three cases. `validate:all` green.
