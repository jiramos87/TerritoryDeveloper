main (plan-review→fix-apply, stage-file-plan→apply, code-review→code-fix-apply, stage-closeout-plan→stage-closeout-apply); drop project-new-plan→project-new-apply seam entry; drop audit→closeout-apply seam entry (replaced Stage-level in T7.13 / T7.14). Update `ia/rules/agent-lifecycle.md` ordered flow: insert `plan-author (Stage 1×N)` between `stage-file-apply` + `plan-review` (multi-task); insert `plan-author (N=1)` between `project-new-apply` + `implement` (single-task path; skip plan-review at N=1). Resolves Open Q7 + S7 (exploration doc §Design Expansion — plan-author + progress-emit + rev 3 stage-end bulk fold).
