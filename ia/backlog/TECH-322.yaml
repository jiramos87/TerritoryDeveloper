notes: |
  New `/ship-stage {MASTER_PLAN_PATH} {STAGE_ID}` dispatcher ‚Äî chains `spec-kickoff ‚Üí spec-implementer ‚Üí verify-loop ‚Üí closeout` across every filed task row of one Stage X.Y in a master plan, end-to-end and autonomously. **Approach B** selected per `/design-explore` interview (Q1=B stateful chain subagent w/ cached MCP context, Q2=A resolved-as-none-needed, Q3=A full auto-resolve next-stage, Q4=C hybrid verify ‚Äî per-task Path A fail-fast + batched Path B at stage end via `--skip-path-b` flag, Q5=C hybrid parser ‚Äî narrow regex v1 + follow-up issue for MCP `spec_stage_table` slice). Hard-depends on **TECH-302** Stage 2 (`domain-context-load` + `term-anchor-verify` shared subskills) ‚Äî do not start Phase 4 authoring until TECH-302 Phase 2 lands. Scope v1: `/ship-stage` only ‚Äî `/ship-step` + `/ship-plan` deferred. Tooling/pipeline only ‚Äî no runtime C# invariants. Design source: `docs/ship-stage-exploration.md` `## Design Expansion` block.
acceptance: |
  `/ship-stage {master-plan-path} Stage X.Y` runs every non-Done filed task row sequentially through kickoff ‚Üí implement ‚Üí verify-loop ‚Üí closeout; stops on first per-task gate failure w/ `STOPPED at {ISSUE_ID}` digest; emits chain-level stage digest aggregating cross-task lessons + decisions (distinct from per-spec `project-stage-close` which fires normally inside each inner `spec-implementer`); `Next:` handoff line auto-resolves for all 4 cases (next filed stage ‚Üí `/ship-stage`, next `_pending_` stage ‚Üí `/stage-file`, next skeleton step ‚Üí `/stage-decompose`, umbrella done ‚Üí `/closeout`); hybrid verify ‚Äî per-task Path A compile gate fail-fast, batched Path B smoke run once at stage end on cumulative delta; `verify-loop` grows `--skip-path-b` flag w/ JSON verdict `path_b: skipped_batched`; regex parser fails loud on master-plan task-table schema mismatch; parser test fixtures cover 2-3 master plans (header-depth `##` / `###` variance); smoke run on a real stage w/ ‚â•2 open tasks passes; follow-up issue filed for `spec_stage_table` MCP slice migration (`depends_on` MCP lifecycle audit); `CLAUDE.md` ¬ß3 + `AGENTS.md` ¬ß2 + `docs/agent-lifecycle.md` ¬ß2 + `ia/rules/agent-lifecycle.md` all list `/ship-stage`; glossary rows added for `ship-stage dispatcher` + `chain-level stage digest`; `npm run validate:all` clean.
depends_on: [TECH-302]
