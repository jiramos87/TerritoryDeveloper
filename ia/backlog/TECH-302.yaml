notes: |
  Refactor rollout skill family to move mechanical Edit / Glob / MCP-fetch work from Opus host to Sonnet surfaces + extract 5 shared subskills killing ~8 copies of the MCP recipe across lifecycle skills. Stage 1 no-risk Sonnet extractions (`progress-regen`, `cardinality-gate-check`, `surface-path-precheck`). Stage 2 shared MCP recipe (`domain-context-load` used by 8+ callers, `term-anchor-verify` used by 3+). Stage 3 rollout-specific splits (`release-rollout-repo-sweep`, `rollout-row-state`). Stage 4 helper-to-subagent promotions (`release-rollout-track` + `release-rollout-skill-bug-log` as Sonnet subagents via new `.claude/agents/*.md`). Stage 5 follow-up audits scoped OUT (stage-decompose `reasoning_effort` pin; project-new split; design-explore Phase 8). Audit source: `docs/release-rollout-model-audit.md`. **Likely candidate for `/master-plan-new` promotion** — capture in Open Questions so product owner can decide single-issue vs umbrella before refinement.
acceptance: |
  all 5 Stage 1–3 shared subskills authored w/ SKILL.md + caveman preamble; 2 Stage 4 Sonnet subagents live under `.claude/agents/`; every caller SKILL.md / agent body updated to invoke new subskill / subagent; `validate:all` green; no regression in rollout tracker advance-one-row smoke test; audit doc §7 stages 1–4 all ticked.
