id: TECH-306
type: infrastructure / simulation signal types
title: "Add `SignalField` + `SignalMetadataRegistry` ScriptableObject (Stage 1.1 T1.1.2)"
priority: medium
status: open
section: Stage 1.1 — Signal Contract Primitives
spec: ia/projects/TECH-306.md
files:
  - Assets/Scripts/Simulation/Signals/SignalField.cs
  - Assets/Scripts/Simulation/Signals/SignalMetadataRegistry.cs
  - Assets/Scripts/Simulation/Signals/SimulationSignal.cs
notes: |
  `SignalField` — plain C# class; `float[,]` backing store sized `(gridWidth, gridHeight)`; methods `Get(x,y)`, `Set(x,y,v)`, `Add(x,y,v)`, `Snapshot()` (returns new independent `float[,]` copy); every write clamps floor to 0 (negative emissions cancel positive source contributions but field never stores negative). `SignalMetadataRegistry` ScriptableObject — per `SimulationSignal` entry: `float diffusionRadius`, `float decayPerStep`, `Vector2 anisotropy`, `enum RollupRule { Mean, P90 }`; Inspector-authored asset; indexed by `SimulationSignal` ordinal. Consumes TECH-305 enum. No MonoBehaviour wiring — data/types only. Respects invariant #12 (permanent signal contract → reference spec T1.1.4).
acceptance: |
  `SignalField.cs` + `SignalMetadataRegistry.cs` compile; `SignalField.Get` always returns ≥ 0 after `Snapshot` or sequence of `Add`/`Set` writes (floor clamp verified); `Snapshot()` returns new array (different reference from backing store); `SignalMetadataRegistry` has entry per `SimulationSignal`; `npm run unity:compile-check` clean; `npm run validate:all` clean.
depends_on: [TECH-305]
depends_on_raw: "TECH-305"
related: []
