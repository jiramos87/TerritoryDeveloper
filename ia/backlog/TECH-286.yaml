notes: |
  New `internal sealed class BlipLutPool` w/ `float[] Lease(int size)` + `void Return(float[])` via `ArrayPool<float>.Shared` (clearArray: true). `BlipCatalog` gains `private BlipLutPool _lutPool = new BlipLutPool()` (field-init; matches Stage 5.2 `_delayPool` precedent; invariant #4 — no new singleton). `BlipVoiceState.phaseD` renamed → `lfoPhase0` (mechanical rename; `phaseD` was dead 4th-osc slot — keeps struct size stable, blittability preserved); `double lfoPhase1` appended. All `state.phaseD` refs migrated in `BlipVoice.cs` + tests.
acceptance: |
  `BlipLutPool.cs` present; `BlipCatalog._lutPool` field-init; `BlipVoiceState.lfoPhase0/lfoPhase1` present + blittable + `default = 0.0`; no singleton; invariant #4 held; `npm run unity:compile-check` green; `npm run validate:all` exit 0; existing golden + NoAlloc tests green.
